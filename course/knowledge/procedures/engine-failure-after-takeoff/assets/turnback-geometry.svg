<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-labelledby="title desc">
  <title id="title">Turnback geometry: why a 180 is not enough</title>
  <desc id="desc">
    Schematic of the teardrop turnback versus a naive 180-degree turn. Shows
    the departure track, the lateral offset created by a 180, and the
    corrective reversal that makes the maneuver a teardrop of roughly 210
    to 270 degrees of total heading change rather than 180. Altitude loss
    figures are illustrative for a C172-class airplane.
  </desc>

  <!-- frame -->
  <rect x="0" y="0" width="800" height="500" fill="#ffffff"/>

  <!-- runway -->
  <rect x="60" y="230" width="520" height="40" fill="#333333"/>
  <text x="320" y="256" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="16">Runway 27</text>

  <!-- runway centerline extended -->
  <line x1="580" y1="250" x2="780" y2="250" stroke="#888888" stroke-width="1" stroke-dasharray="6 6"/>

  <!-- departure track (climb out to the right) -->
  <path d="M 580 250 Q 640 240 700 220" stroke="#0066cc" stroke-width="3" fill="none"/>
  <circle cx="700" cy="220" r="6" fill="#0066cc"/>
  <text x="712" y="216" fill="#0066cc" font-family="sans-serif" font-size="14">engine fails (~200 AGL)</text>

  <!-- naive 180 turn (dashed red) -->
  <path d="M 700 220 A 110 110 0 0 1 700 440" stroke="#cc0000" stroke-width="2" fill="none" stroke-dasharray="6 4"/>
  <text x="710" y="330" fill="#cc0000" font-family="sans-serif" font-size="13">naive 180</text>

  <!-- after naive 180: airplane now headed back but offset laterally -->
  <g transform="translate(700,440)">
    <polygon points="-8,0 8,0 0,-14" fill="#cc0000" transform="rotate(180)"/>
  </g>
  <text x="590" y="455" fill="#cc0000" font-family="sans-serif" font-size="12">offset from centerline -- still need to glide back AND correct track</text>

  <!-- teardrop turn (green) -->
  <path d="M 700 220 A 130 130 0 0 1 700 480" stroke="#006633" stroke-width="2" fill="none"/>
  <path d="M 700 480 Q 620 480 540 430" stroke="#006633" stroke-width="2" fill="none"/>
  <text x="540" y="490" fill="#006633" font-family="sans-serif" font-size="13">teardrop (~210-270 deg total)</text>

  <!-- legend -->
  <g transform="translate(60,60)" font-family="sans-serif" font-size="13">
    <text x="0" y="0" font-weight="bold">Altitude loss components (C172-class, best glide ~68 KIAS, ~650 fpm sink)</text>
    <text x="0" y="22">startle + pitch-down (3-5 sec)</text>
    <text x="300" y="22">~35-55 ft</text>
    <text x="0" y="42">180-deg turn at 45-deg bank</text>
    <text x="300" y="42">~120 ft</text>
    <text x="0" y="62">rollout + track correction back to runway</text>
    <text x="300" y="62">~100-300 ft</text>
    <text x="0" y="82">total realistic (good conditions)</text>
    <text x="300" y="82" font-weight="bold">400-800+ ft AGL</text>
    <text x="0" y="104" fill="#cc0000" font-weight="bold">Numbers are illustrative. Know YOUR airplane's number from practice at altitude.</text>
  </g>

  <!-- caption -->
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold">
    The turnback is not a 180. It is a teardrop plus a glide back.
  </text>
</svg>
