area:
  code: I
  ordinal: 1
  title: Preflight Preparation
  airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01?at=2023-11'
  citations: []

# Only Task C (Weather Information) is transcribed in this PR. Tasks A
# (Pilot Qualifications), B (Airworthiness Requirements), D (Cross-Country
# Flight Planning), E (National Airspace System), F (Performance and
# Limitations), G (Operation of Systems), and H (Human Factors) land in
# follow-on PRs. Task ordinals reserve A=1, B=2, C=3 etc. so future
# transcriptions slot in without renumbering.
tasks:
  - code: I.C
    ordinal: 3
    title: Weather Information
    airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c?at=2023-11'
    classes: null
    references:
      - 14 CFR part 91
      - 14 CFR part 121
      - 14 CFR part 125
      - 14 CFR part 135
      - FAA-H-8083-2 (Risk Management Handbook)
      - FAA-H-8083-25 (Pilot's Handbook of Aeronautical Knowledge)
      - FAA-H-8083-28 (Aviation Weather Handbook)
      - AC 00-6 (Aviation Weather)
      - AC 00-45 (Aviation Weather Services)
      - AIM
    objective: |
      To determine the applicant exhibits satisfactory knowledge, risk
      management, and skills associated with weather information for a
      flight under VFR.
    elements:
      - code: I.C.K1
        triad: knowledge
        ordinal: 1
        required_bloom: understand
        title: Sources of weather data for flight planning purposes.
        description: |
          Sources of weather data (e.g., National Weather Service, Flight
          Service) for flight planning purposes.
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-k01?at=2023-11'

      - code: I.C.K2
        triad: knowledge
        ordinal: 2
        required_bloom: understand
        title: Acceptable weather products and resources for preflight planning.
        description: |
          Acceptable weather products and resources required for preflight
          planning, current and forecast weather for departure, en route, and
          arrival phases of flight such as:
            a. Airport Observations (METAR and SPECI) and Pilot Observations (PIREP)
            b. Surface Analysis Chart, Ceiling and Visibility Chart (CVA)
            c. Terminal Aerodrome Forecasts (TAF)
            d. Graphical Forecasts for Aviation (GFA)
            e. Wind and Temperature Aloft Forecast (FB)
            f. Convective Outlook (AC)
            g. Inflight Aviation Weather Advisories including Airmen's Meteorological Information (AIRMET), Significant Meteorological Information (SIGMET), and Convective SIGMET
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-k02?at=2023-11'

      - code: I.C.K3
        triad: knowledge
        ordinal: 3
        required_bloom: understand
        title: Meteorology applicable to departure, en route, alternate, and destination under VFR.
        description: |
          Meteorology applicable to the departure, en route, alternate, and
          destination under VFR in Class D, E, and G airspace, to include
          expected climate and hazardous conditions such as:
            a. Atmospheric composition and stability
            b. Wind (e.g., crosswind, tailwind, windshear, mountain wave, etc.)
            c. Temperature and moisture
            d. Precipitation
            e. Weather system formation, including air masses and fronts
            f. Clouds
            g. Turbulence
            h. Thunderstorms and microbursts
            i. Icing and freezing level information
            j. Fog/mist
            k. Frost
            l. Obstructions to visibility (e.g., smoke, haze, volcanic ash, etc.)
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-k03?at=2023-11'

      - code: I.C.K4
        triad: knowledge
        ordinal: 4
        required_bloom: understand
        title: Flight deck displays of digital weather and aeronautical information.
        description: Flight deck displays of digital weather and aeronautical information.
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-k04?at=2023-11'

      - code: I.C.R1
        triad: risk_management
        ordinal: 5
        required_bloom: apply
        title: Factors involved in making the go/no-go and continue/divert decisions.
        description: |
          Factors involved in making the go/no-go and continue/divert
          decisions, to include:
            a. Circumstances that would make diversion prudent
            b. Personal weather minimums
            c. Hazardous weather conditions to include known or forecast icing or turbulence aloft
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-r01?at=2023-11'

      - code: I.C.R2
        triad: risk_management
        ordinal: 6
        required_bloom: apply
        title: Limitations of onboard weather equipment, weather reports/forecasts, and inflight weather resources.
        description: |
          Limitations of:
            a. Onboard weather equipment
            b. Aviation weather reports and forecasts
            c. Inflight weather resources
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-r02?at=2023-11'

      - code: I.C.S1
        triad: skill
        ordinal: 7
        required_bloom: apply
        title: Use available aviation weather resources to obtain an adequate weather briefing.
        description: Use available aviation weather resources to obtain an adequate weather briefing.
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-s01?at=2023-11'

      - code: I.C.S2
        triad: skill
        ordinal: 8
        required_bloom: apply
        title: Analyze the implications of at least three meteorological conditions from K3.
        description: |
          Analyze the implications of at least three of the conditions listed
          in K3a through K3l, using actual weather or weather conditions
          scenario provided by the evaluator.
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-s02?at=2023-11'

      - code: I.C.S3
        triad: skill
        ordinal: 9
        required_bloom: apply
        title: Correlate weather information to make a competent go/no-go decision.
        description: Correlate weather information to make a competent go/no-go decision.
        airboss_ref: 'airboss-ref:acs/ppl-airplane-6c/area-01/task-c/elem-s03?at=2023-11'

# Knowledge graph links: which course/knowledge nodes does each Task C
