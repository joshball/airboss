    - node_id: wx-product-gfa
      weight: 0.7
      notes: K2d Graphical Forecasts for Aviation.
    - node_id: wx-product-winds-aloft
      weight: 0.7
      notes: K2e Wind and Temperature Aloft Forecast (FB).
    - node_id: wx-product-convective-outlook
      weight: 0.5
      notes: K2f Convective Outlook (AC).
    - node_id: wx-product-airmets-sigmets
      weight: 0.9
      notes: K2g AIRMET / SIGMET / Convective SIGMET decode and use.

  I.C.K3:
