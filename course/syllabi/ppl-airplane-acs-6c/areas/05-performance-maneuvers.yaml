      - FAA-H-8083-2 (Risk Management Handbook)
      - FAA-H-8083-3 (Airplane Flying Handbook)
      - FAA-H-8083-25 (Pilot's Handbook of Aeronautical Knowledge)
    objective: |
      To determine the applicant exhibits satisfactory knowledge, risk
      management, and skills associated with ground reference maneuvering
      which may include a rectangular course, S-turns, and turns around a
      point.

      Note: The evaluator selects at least one ground reference maneuver
      for the applicant to demonstrate.
    elements:
