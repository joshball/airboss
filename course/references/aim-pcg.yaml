# Pilot/Controller Glossary (PCG) -- citation-fallback umbrella.
#
# The PCG's 297 glossary terms ship as `kind: 'glossary'` rows inside the
# AIM (`aim/2026-04/manifest.json`, seeded by WP-AIM), so the umbrella
# carries no readable content of its own. It exists to match the migration's
# hardcoded `(slug='pcg', edition='current')` resolver in
# `scripts/db/migrate-references-to-structured.ts:421-437`. Without this
# authored row, any legacy citation with a bare `PCG` source would upsert
# a synthetic row stamped with `MIGRATION_SEED_ORIGIN`.
#
# This is the same pattern as `generic-acs` / `generic-pts` in
# `other-publications.yaml`: an umbrella that absorbs unspecific citations
# until they're updated to point at specific AIM glossary entries.
#
# Retire trigger: every legacy `PCG` citation has been re-pointed at a
# specific AIM glossary term (paragraph reference under AIM PCG sections),
# AND the migration's PCG resolver is removed. Then this file goes too.

references:
  - slug: pcg
    kind: pcg
    edition: current
    title: Pilot/Controller Glossary
    publisher: FAA
    url: https://www.faa.gov/air_traffic/publications/atpubs/pcg_html/
    subjects: [communications]
    primary_cert: null
