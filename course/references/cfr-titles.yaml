# Code of Federal Regulations parts referenced by airboss content.
#
# Slug shape: `<title>cfr<part>` matches what scripts/db/migrate-references-to-structured.ts
# generates so the migration finds an authored row instead of upserting a
# synthetic one. Edition `current` follows the same convention -- CFR is a
# rolling publication, not editioned, so `current` is the canonical pin
# until ADR 019's annual diff job lands and starts emitting yearly slugs.
#
# Title 14 covers Aeronautics and Space; Title 49 covers Transportation
# (incl. NTSB Part 830 and TSA Part 1552 referenced from cert-syllabus
# regulations course material).
#
# All CFR rows carry `primary_cert: null` -- the regulations spine groups
# them by Title/Part, not by cert (per library-by-cert WP placement table).

references:
