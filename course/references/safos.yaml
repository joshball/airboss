# FAA Safety Alerts for Operators (SAFOs) referenced by airboss content.
#
# SAFOs are short FAA bulletins (1-3 pages) addressing immediate safety
# concerns. Each SAFO has a stable 5-digit `<YY><sequence>` id that doubles as
# its slug suffix; SAFOs are immutable post-publication so the edition string
# is identical to the publication tag (`SAFO 23001`).
#
# URLs: live FAA URLs work for some years (notably 2017-2018, 2023-2025) but
# not for 2019-2022 where the FAA's CMS rotated paths. Entries omit `url:`
# when the canonical URL is unstable; the flightbag reader links to the
# in-app body in that case (the source PDF SHA stays in the on-disk
# manifest for audit).
#
# Slug shape: `safo-<NNNNN>` (lowercase, kebab-case). Edition: `SAFO <NNNNN>`.

references:
  - slug: safo-23001
    kind: safo
    edition: SAFO 23001
    title: 'Potential Damage to Nose Landing Gear by Improper Towing Procedures (MHIRJ CRJ Series)'
    publisher: FAA
    url: https://www.faa.gov/sites/faa.gov/files/SAFO23001.pdf
    subjects: [maintenance, procedures]
    primary_cert: null

