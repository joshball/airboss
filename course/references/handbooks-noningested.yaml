# FAA handbooks referenced by airboss content but not yet ingested via the
# `handbooks/` derivative pipeline (ADR 018 cache pattern).
#
# `handbooks/` ingests PHAK / AFH / AvWx as section-trees today; AIH / IFH /
# IPH / RMH live as whole-doc rows under the handbooks-extras pipeline at
# `libs/sources/src/handbooks-extras/ingest.ts` (canonical slugs:
# `aviation-instructor`, `ifh`, `iph`, `risk-management`). The previous
# duplicate rows here (`aih + FAA-H-8083-9B`, `faa-h-8083-2 + FAA-H-8083-2A`)
# were retired in the references cleanup sweep -- the migrator at
# `scripts/db/migrate-references-to-structured.ts` now resolves citations
# directly to the handbooks-extras `(slug, edition)` pairs.
#
# The single remaining row -- `afh` at `FAA-H-8083-3B` -- exists so historical
# citations to the prior AFH edition (3C is current and section-tree
# ingested) resolve cleanly. Deleting it requires a content audit that
# re-points every node's `source` string to 3C; tracked as low priority in
# the references roadmap.

references:
  # AFH 3B was the prior edition. Knowledge nodes still reference it
  # explicitly in `source` strings; rather than rewrite every node to 3C
  # (which would risk dangling chapter references; AFH reorganizes across
  # editions), keep both editions authored so citations resolve cleanly
  # until a content audit promotes them.
  - slug: afh
    kind: handbook
    edition: FAA-H-8083-3B
    title: Airplane Flying Handbook (prior edition)
    publisher: FAA
    url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/airplane_handbook
    subjects: [procedures, aerodynamics, training-ops]
    primary_cert: private
