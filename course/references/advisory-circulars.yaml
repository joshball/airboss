# FAA Advisory Circulars referenced by airboss content.
#
# Slug shape: `ac-<NN-NN>` (omits the edition letter so the slug is stable
# across revisions). Edition includes the trailing letter when known
# (`AC 61-67C`). This matches what scripts/db/migrate-references-to-structured.ts
# generates so the migration finds an authored row.
#
# URLs follow the FAA Document Library canonical pattern when known:
# `https://www.faa.gov/documentLibrary/media/Advisory_Circular/AC_<EDITION>.pdf`
# (where `<EDITION>` includes the revision letter, e.g. `00-6B`, `91-23A`).
#
# Readable (section-tree) ACs omit `url:` because the manifest's `source_url`
# wins via the manifest-phase seeder, and the in-app reader is preferred over
# the external link anyway. Link-only stubs (Wave 6: ACs whose body has not
# been extracted yet) carry an explicit `url:` so the library card and
# citation chips deep-link to the FAA-hosted PDF instead of the AC index
# landing. When such a card later promotes to readable, its YAML `url:`
# becomes redundant and may be removed.
#
# Most AC rows carry `primary_cert: null` -- ACs are FAA-published policy
# under the regulations spine (grouped by series), not under any cert spine
# (per library-by-cert WP placement table). The exception is AC 61-65J
# (cert + instructor endorsements), which is unambiguously CFI-owned.

