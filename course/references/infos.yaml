# FAA Information for Operators (InFOs) referenced by airboss content.
#
# Sibling to `safos.yaml`. InFOs are advisory bulletins from FAA Flight
# Standards Service; they share the same 1-3 page format, 5-digit id, and
# immutable-post-publication semantics as SAFOs.
#
# Slug shape: `info-<NNNNN>`. Edition: `InFO <NNNNN>`.

