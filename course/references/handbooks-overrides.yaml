# Library-by-cert override rows for handbooks ingested by the
# `handbooks/<slug>/<edition>/manifest.json` pipeline (PHAK, AFH 3C, AvWx).
#
# Why this file exists:
#   - Wave 2 of the library-by-cert WP backfills `study.reference.primary_cert`
#     for every reference. The non-ingested handbooks (AIH, IFH, IPH, Risk
#     Mgmt, AFH 3B) get their cert from `handbooks-noningested.yaml`. The
#     three ingested handbooks (PHAK, AFH 3C, AvWx) are seeded by
#     `scripts/db/seed-handbooks.ts` reading their manifests.
#   - The `handbookManifestSchema` (libs/bc/study/src/handbook-validation.ts)
#     doesn't currently model `primary_cert`, and `seed-handbooks.ts` doesn't
#     forward `primaryCert` to `upsertReference`. Adding it would touch BC code
#     scoped to a later wave.
#   - `seed-all.ts` runs `phaseHandbooks()` BEFORE `phaseReferences()`, so a
#     YAML row matching `(slug, edition)` for an already-seeded handbook acts
#     as an override -- the upsert UPDATEs the existing row and sets
#     `primary_cert`. Run-order dependence is documented here as the contract.
#
# Removal trigger:
#   When the manifest schema gains `primary_cert` and `seed-handbooks.ts`
#   forwards it to `upsertReference`, this whole file goes away (the manifest
#   becomes the canonical source).
#
# Field mirroring:
#   The fields below mirror `handbooks/<slug>/<edition>/manifest.json` so the
#   upsert is a no-op apart from setting `primary_cert`. If a handbook's
#   manifest title/subjects/url change, this file MUST be updated to match or
#   the override will quietly stomp the manifest values.

references:
  - slug: phak
    kind: handbook
    edition: FAA-H-8083-25C
    title: Pilot's Handbook of Aeronautical Knowledge
    publisher: FAA
    url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/faa-h-8083-25c.pdf
    subjects: [aerodynamics, aircraft-systems, weather]
    primary_cert: private

  - slug: afh
    kind: handbook
    edition: FAA-H-8083-3C
    title: Airplane Flying Handbook
    publisher: FAA
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/00_afh_full.pdf
    subjects: [procedures, aerodynamics, training-ops]
    primary_cert: private

  - slug: avwx
    kind: handbook
    edition: FAA-H-8083-28B
    title: Aviation Weather Handbook
    publisher: FAA
    url: https://www.faa.gov/sites/faa.gov/files/FAA-H-8083-28B.pdf
    subjects: [weather]
    primary_cert: private
