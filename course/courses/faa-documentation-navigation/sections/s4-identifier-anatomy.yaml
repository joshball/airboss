    ordinal: 1
    title: Parsing an AC, a CFR cite, and an AIM cite
    body_md: |
      The framing question for the knowledge node: when you see a
      citation anywhere - in this app, in an AC, in someone's email -
      can you name every part of it and say which family it belongs
      to before you look anything up?

      The node trains the parse on all three citation shapes and
      keeps the identifier-versus-title distinction central: the
      identifier is the address, the title is the description. Get
      that straight and `AC 00-45H` versus "Aviation Weather
      Services" stops being a single blurry thing and becomes two
      clear ones.
