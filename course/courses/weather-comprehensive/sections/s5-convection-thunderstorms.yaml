code: s5
ordinal: 5
title: Convection - thunderstorms and severe weather
body_md: |
  **Before you start.** This section assumes you understand
  [instability](/reference/knowledge/wx-stability-and-instability)
  from s2 (a parcel that keeps rising once nudged is the thunderstorm
  precondition) and the
  [cumulus cloud family](/reference/knowledge/wx-clouds-and-precipitation)
  from s3 (the visible signature of vertical motion). It teaches the
  thunderstorm itself: the hazard set, the avoidance distance, and
  why every secondary hazard compounds the primary one.

  Terms you will see referenced but not fully taught here:

  - [Convective SIGMET](/reference/knowledge/wx-product-airmets-sigmets)
    and the
    [Day-1 convective outlook](/reference/knowledge/wx-product-convective-outlook):
    the products that flag this weather pre-flight. Taught in s8.5
    and s8.6.
  - [Microburst](/reference/knowledge/wx-thunderstorm-hazards):
    introduced here as a hazard family; the avoidance procedures live
    inside the node.
  - [Summer pop-up scenario s11.2](/courses/weather-comprehensive/s11.2):
    end-to-end worked example of air-mass thunderstorms triggered by
    an outflow boundary. Read after finishing s5.

  Treat the 20 NM rule as a personal minimum, not a guideline.

  ---

  A [thunderstorm](/reference/knowledge/wx-thunderstorm-hazards) is
  the atmosphere taking the lid off a
  [stable](/reference/knowledge/wx-stability-and-instability) layer
  and letting unstable air go vertical -- 30,000, 40,000, sometimes
  60,000 feet of vertical motion. Inside a mature cell are updrafts
  and downdrafts that exceed any general aviation airframe's design
  envelope, hail that can shatter a windscreen, microbursts that have
  put airliners into the ground, and electrical activity that can
  blind avionics for the rest of the flight.

  The pilot rule is uncomplicated: 20 nautical miles of clearance from
  any cell with a top above the
  [freezing level](/reference/knowledge/wx-freezing-level). The pilot
  reality is that cells move, build, and merge, so 20 NM at the time
  of [briefing](/reference/knowledge/wx-briefing-execution) is not 20
  NM at the time of arrival. This section trains the thunderstorm
  picture and then immediately re-trains the
  [personal minimum](/reference/knowledge/wx-personal-minimums) that
  says "if I'm closer than 20 NM, I'm not flying."

  A real radar mosaic from a severe-weather day (renders against the
  authored chart instance via the wx-charts library):

  :::chart slug="wx-radar-mosaic-2024-05-21-22z"
  :::

  Read the chart with the question: where would I have to be to
  maintain 20 NM clearance from every cell, and how does that change
  as the cells move?
steps:

  - code: s5.1
    ordinal: 1
    title: Thunderstorm hazards
    body_md: |
      Thunderstorms are the only weather phenomenon where the FAA
      gives a numeric clearance distance, because they're the only
      phenomenon where every other rule of thumb has failed pilots
      enough times to need one. The 20 NM number comes from the
      observed reach of hail, downdrafts, and lightning beyond the
      visible cell boundary.

      Every secondary hazard -- microbursts, gust fronts, hail shafts,
      tornadoes, lightning damage, embedded
      [turbulence](/reference/knowledge/wx-turbulence-types) --
      compounds the primary one. A pilot who treats the cell as a
      single avoidable obstacle will eventually meet a hazard that
      wasn't on the cell's edge.
    knowledge_node_id: wx-thunderstorm-hazards
