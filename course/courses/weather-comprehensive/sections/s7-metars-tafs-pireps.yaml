code: s7
ordinal: 7
title: Reading weather products - METARs, TAFs, PIREPs
body_md: |
  **Before you start.** This section assumes you are comfortable with
  the synoptic story from s2 through s6: air masses, fronts,
  stability, clouds, convection, and icing. The products in this
  section describe the same atmosphere; reading them well requires
  the picture from the earlier sections to be the frame. If any of
  those concepts feel shaky, go back; do not try to memorize METAR
  syntax in isolation.

  This section teaches the three text-based reports a pilot reads on
  every flight:
  [METAR](/reference/knowledge/wx-reading-metars)
  ([reference](/reference/wx/products/metar)) (current
  airport conditions),
  [TAF](/reference/knowledge/wx-reading-tafs)
  ([reference](/reference/wx/products/taf)) (terminal
  forecast for a 5 SM radius around the station), and
  [PIREP](/reference/knowledge/wx-product-pireps)
  ([reference](/reference/wx/products/pirep)) (pilot report from
  the air).

  Terms you will see referenced but not fully taught here:

  - The graphical / regional products
    ([GFA](/reference/knowledge/wx-product-gfa),
    [AIRMET](/reference/knowledge/wx-product-airmets) /
    [SIGMET](/reference/knowledge/wx-product-sigmets),
    [winds aloft](/reference/knowledge/wx-product-winds-aloft),
    [convective outlook](/reference/knowledge/wx-product-convective-outlook)):
    these zoom out to the region; taught in s8. Reference pages:
    [GFA](/reference/wx/products/gfa),
    [AIRMET](/reference/wx/products/airmet),
    [SIGMET](/reference/wx/products/sigmet),
    [winds aloft](/reference/wx/products/winds-temps-aloft),
    [convective outlook](/reference/wx/products/convective-outlook).
  - The [TAF timeline](/reference/knowledge/wx-reading-tafs)
    chart: a visualization of the FM / TEMPO / PROB blocks; the
    underlying TAF reading skill is taught in s7.1 below.
  - [Severe-weather day worked example](/reference/knowledge/wx-thunderstorm-hazards):
    the radar mosaic from s5 reappears here paired with PIREPs;
    treat the cross-reference as practice, not as new material.

  ---

  Sections 2-6 built the synoptic story; this section is where the
  story meets the printed page.
  [METARs](/reference/knowledge/wx-reading-metars),
  [TAFs](/reference/knowledge/wx-reading-tafs), and
  [PIREPs](/reference/knowledge/wx-product-pireps) are the three
  workhorse products you will read on every flight, and reading them
  well is a three-stage skill: decode the symbols, understand the
  picture they describe, triage what matters for this flight.

  The decode stage is mechanical -- it's the alphabet. The understand
  stage is where pilots get stuck because the products are written
  for a meteorologist, not a pilot, and require the synoptic frame
  from earlier sections to make sense. The triage stage separates a
  pilot who can read every line from a pilot who can identify the
  three lines that change the
  [go/no-go decision](/reference/knowledge/wx-go-nogo-decision).

  A METAR plot for an iconic mid-Atlantic morning (renders against the
  authored chart instance via the wx-charts library):

  :::chart slug="reference-fixtures/wx-metar-plot-grid-2024-01-13-12z"
  :::
steps:

  - code: s7.1
    ordinal: 1
    title: Reading METARs
    body_md: |
      A METAR is a snapshot of conditions at a single airport at a
      single time, issued near the top of every hour and encoded in a
      fixed-order group sequence. It's the most-read product in
      aviation and the canonical example of the encoded-text family.

      The pilot-relevant lines: [wind](/reference/knowledge/wx-wind-systems)
      (with gust spread),
      [visibility](/reference/knowledge/wx-fog-and-visibility-obstructions),
      ceiling, weather phenomena, altimeter. The triage habit is to
      ask which three of the eleven groups would change your decision
      if they shifted by a step -- those are the drivers; the rest are
      confirmation. On a near-saturation morning, the temperature /
      dew-point spread is almost always one of the three.
    knowledge_node_id: wx-reading-metars

  - code: s7.2
    ordinal: 2
    title: Reading TAFs
    body_md: |
      A TAF is a forecast for a 5-statute-mile radius around the
      reporting station, valid 24 or 30 hours and issued every 6
      hours. It shares the METAR alphabet but adds the
      forecaster-confidence vocabulary: FM (hard reset), TEMPO (brief
      excursion), PROB30 / PROB40 (probability), BECMG (gradual
      transition).

      A TAF read as a timeline rather than a wall of encoded text --
      every FM, TEMPO, and PROB block becomes a visible change in
      ceiling, visibility, wind, or weather. Look at the chart and
      ask: where does this airport go IFR, and for how long?

      :::chart slug="reference-fixtures/wx-taf-timeline-kmem-2026-05-10-1720z"
      :::

      The triage habit: compare the current METAR to the most recent
      TAF amendment -- if reality is already running ahead of the
      forecast, the forecast is suspect for the rest of its valid
      period and an AMD is probably overdue.
    knowledge_node_id: wx-reading-tafs

  - code: s7.3
    ordinal: 3
    title: PIREPs - reading and filing
    body_md: |
      Every other product in this section is generated. PIREPs are
      the only product authored by another pilot in the air, and that
      makes them the highest-fidelity report you have for what the
      airframe is actually feeling at altitude.

      A real PIREP plot from the same severe-weather day as the s5
      radar mosaic -- read this against the radar and ask which cells
      have a pilot report nearby and which do not:

      :::chart slug="reference-fixtures/wx-pirep-plot-grid-2024-05-21-22z"
      :::

      Read every PIREP within 100 NM of your route, especially the
      ones that mention
      [turbulence](/reference/knowledge/wx-turbulence-types),
      [icing](/reference/knowledge/wx-icing-types-and-avoidance), or
      cloud tops -- those are the conditions hardest to forecast and
      most useful to know. And then file your own. The PIREP system
      only works if pilots feed it; the urgent (UUA) one you file at
      11,500 about moderate mixed icing might be the data point that
      turns another pilot around at 9,500.
    knowledge_node_id: wx-product-pireps
