code: s3
ordinal: 3
title: Clouds, precipitation, and visibility
body_md: |
  **Before you start.** This section assumes you have read s2 and
  understand
  [air masses, fronts](/reference/knowledge/wx-airmasses-and-fronts),
  and
  [stability / instability](/reference/knowledge/wx-stability-and-instability)
  as the lifting mechanism for vertical motion. It teaches the
  visible consequences of that motion: what cloud shapes mean,
  what precipitation types tell you about the column above your
  flight path, and what reduces visibility on the surface.

  Terms you will see referenced but not fully taught here:

  - [Freezing rain](/reference/knowledge/wx-icing-types-and-avoidance):
    introduced as the most dangerous icing setup. Taught fully in s6.
  - [METAR](/reference/knowledge/wx-reading-metars) ceiling and
    visibility lines: how the obstructions you read about in s3.2
    show up in the airport report. Taught in s7.
    [Reference page](/reference/wx/products/metar).

  Build the cloud-and-visibility picture from physics here; the
  product readouts catch up in s7 and s8.

  ---

  A cloud is the visible answer to a question the atmosphere already
  asked: where did the rising air cool to its dew point? The shape of
  the cloud tells you which mechanism lifted the air, how stable the
  A [cloud](/reference/knowledge/wx-clouds-and-precipitation) is the
  visible answer to a question the atmosphere already asked: where did
  the rising air cool to its dew point? The shape of the cloud tells
  you which mechanism lifted the air, how
  [stable](/reference/knowledge/wx-stability-and-instability) the layer
  was, and what's likely to come next.

  This section connects the synoptic story (s2) to what you actually
  see out the windscreen. Cloud type, base height, and precipitation
  pattern aren't decorations -- they're a real-time diagnostic of the
  [air mass](/reference/knowledge/wx-airmasses-and-fronts) you're
  flying through, and (usually) the most accurate forecast available
  because you're reading it firsthand.

  The framing question for both steps: what is this cloud telling me
  about the air I'm about to enter?

  Two satellite views of the same December 23 atmosphere we met in
  s2. The infrared image works day or night and shows cloud-top
  temperature -- colder tops are higher tops, and higher tops mean
  more vertical development:

  :::chart slug="reference-fixtures/wx-satellite-ir-2024-12-23-12z"
  :::

  The visible image (six hours later, when the sun is up) shows the
  same cloud field by reflected sunlight. Compare the two: which
  features show up bright on visible but cold on IR, and what does
  that combination mean for the cloud type and the flight through
  it?

  :::chart slug="reference-fixtures/wx-satellite-vis-2024-12-23-18z"
  :::
steps:

  - code: s3.1
    ordinal: 1
    title: Clouds, temperature/moisture, and precipitation
    body_md: |
      Cumulus, stratus, cirrus -- the three families and their hybrids.
      Each shape implies a lifting mechanism and a
      [stability](/reference/knowledge/wx-stability-and-instability)
      profile. Cumulus = unstable + convective lift. Stratus = stable +
      widespread lift. Cirrus = high, ice, often the leading edge of
      an approaching [front](/reference/knowledge/wx-airmasses-and-fronts).

      Precipitation type follows from the same physics: rain from
      warm/melting precip, snow from sub-freezing crystals all the way
      down, freezing rain from a warm layer aloft over a cold layer
      below (the most dangerous
      [icing](/reference/knowledge/wx-icing-types-and-avoidance) setup
      we'll meet again in s6).
    knowledge_node_id: wx-clouds-and-precipitation

  - code: s3.2
    ordinal: 2
    title: Fog, frost, and visibility obstructions
    body_md: |
      Visibility kills more pilots than ceiling. A 1,000-foot ceiling
      with 10 SM visibility is workable; an 800-foot ceiling with 1
      SM visibility is a different flight entirely.

      Fog is the most variable component of any forecast: it forms by
      multiple mechanisms (radiation, advection, upslope, freezing,
      ice, steam), each with a different dispersal trigger. Frost on
      the airframe degrades lift more than its mass would suggest.
      Smoke, haze, blowing dust, blowing snow, volcanic ash -- all
      reduce slant visibility differently than they reduce reported
      surface visibility. The product number is a starting point, not
      the ground truth.
    knowledge_node_id: wx-fog-and-visibility-obstructions
