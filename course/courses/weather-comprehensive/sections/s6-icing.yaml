code: s6
ordinal: 6
title: Icing - types, avoidance, decision-making
body_md: |
  **Before you start.** This section assumes the
  [cloud and precipitation picture](/reference/knowledge/wx-clouds-and-precipitation)
  from s3 (cloud type implies droplet size and supercooled-liquid
  potential) and the
  [freezing-rain warning](/reference/knowledge/wx-clouds-and-precipitation)
  flagged there (warm layer aloft over a cold layer below). It
  teaches the icing decision: the three ice forms, how to avoid them,
  and the freezing level as the diagnostic that says whether an out
  exists.

  Terms you will see referenced but not fully taught here:

  - [CIP and FIP](/reference/knowledge/wx-product-airmets-sigmets)
    (current and forecast icing potential): introduced here through
    the embedded charts. The product family is taught in s8.5
    alongside the icing G-AIRMET.
  - [Lake-effect icing scenario s11.3](/courses/weather-comprehensive/s11.3):
    end-to-end worked example of cP air over warm water,
    freezing-drizzle in the column, and why the non-FIKI "climb over"
    plan fails. Read after finishing s6.
  - [Rotor cloud icing](/reference/knowledge/wx-icing-types-and-avoidance):
    a special-case icing reservoir tied to mountain-wave geometry.
    Walked in [s11.4](/courses/weather-comprehensive/s11.4).

  The "out" must exist before you enter the icing, not after.

  ---

  An iced airframe is a different airframe. Lift drops, drag rises,
  stall speed climbs, control authority degrades -- all four happen at
  once and all four accelerate as more ice accumulates. There is no
  amount of pilot skill that compensates for a wing that has stopped
  being a wing.

  [Icing](/reference/knowledge/wx-icing-types-and-avoidance) is a
  probability problem the pilot manages through avoidance, not
  penetration. The "out" -- a layer above, a layer below, a turn back
  into clear air, a descent into above-freezing temperatures -- must
  exist before you commit to the icing-prone air, not after. The most
  dangerous icing flights are the ones where the pilot intended to
  "just take a look" and discovered the look was a commitment.

  An icing potential chart for the same December weather day as the
  surface analysis in s2 (placeholder slug; resolves to live SVG when
  the wx-charts CIP renderer ships):

  :::chart slug="reference-fixtures/wx-icing-cip-2024-12-23-12z"
  :::

  Read the chart with two questions: where is the
  [freezing level](/reference/knowledge/wx-freezing-level), and where
  is liquid water above it?
steps:

  - code: s6.1
    ordinal: 1
    title: Icing types and avoidance
    body_md: |
      Three ice forms cover most of what general aviation will see.
      Rime is granular, white, opaque, accumulating slowly in
      [stratus](/reference/knowledge/wx-clouds-and-precipitation); it
      spoils airflow but doesn't dramatically change the wing shape.
      Clear is glassy, hard to see, accumulating fast in cumulus or
      freezing rain; it can re-shape the wing in minutes. Mixed is
      both at once and combines the worst of each.

      The avoidance rule chains: avoid visible moisture in temperatures
      from +2 C to -20 C; if you're already in it, climb above the
      moisture or descend below the
      [freezing level](/reference/knowledge/wx-freezing-level); if
      neither out exists, turn around now while you still have the
      control authority to do so. Anti-ice and de-ice equipment buy
      you minutes, not hours.

      Where CIP (the section opener) is current icing, FIP is the
      forecast counterpart -- same gridded scalar field, projected
      forward in time. Compare this 18Z forecast to the 12Z CIP we
      opened the section with and ask: where is icing expected to
      worsen over the next six hours, and would that change a
      decision we made at briefing?

      :::chart slug="reference-fixtures/wx-icing-fip-2024-12-23-18z"
      :::
    knowledge_node_id: wx-icing-types-and-avoidance

  - code: s6.2
    ordinal: 2
    title: Freezing level
    body_md: |
      [Icing](/reference/knowledge/wx-icing-types-and-avoidance)
      requires two ingredients in the same air: liquid water and a
      temperature at or below freezing. The freezing level is where
      the second ingredient starts. Above it, any cloud you fly through
      is a candidate; below it, you can be in cloud all day without
      ice. Knowing where the freezing level sits along your route is
      the difference between "I can climb out of icing" and "there is
      no out."

      The forecast freezing-level chart for the same December 23
      synoptic setup. Read it together with the CIP / FIP charts from
      s6.1: where is the freezing level low enough that the
      below-freezing layer reaches the ground (so descending is not
      an out), and where would a climb actually leave the icing
      layer behind?

      :::chart slug="reference-fixtures/wx-freezing-level-2024-12-23-12z"
      :::
    knowledge_node_id: wx-freezing-level
