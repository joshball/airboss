code: s2
ordinal: 2
title: Air masses, fronts, and stability
body_md: |
  **Before you start.** This section assumes you have read s1 and
  understand that weather is the input to a go/no-go decision; nothing
  else carries over. It teaches the synoptic story: air masses,
  fronts, the surface analysis chart, and stability / instability.
  Everything in s3 through s9 is downstream of this section, so this
  is the highest-leverage frame in the course.

  Terms you will see referenced but not fully taught here:

  - [TAF](/reference/knowledge/wx-reading-tafs) and
    [METAR](/reference/knowledge/wx-reading-metars): the airport
    text reports. Taught in s7. Reference pages:
    [TAF](/reference/wx/products/taf),
    [METAR](/reference/wx/products/metar).
  - [AIRMET](/reference/knowledge/wx-product-airmets) /
    [SIGMET](/reference/knowledge/wx-product-sigmets): the hazard
    polygon products. Taught in s8.5. Reference pages:
    [AIRMET](/reference/wx/products/airmet),
    [SIGMET](/reference/wx/products/sigmet).
  - [Surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
    as a product (vs the symbol-reading skill, which has its own
    [chart-type reading node](/reference/knowledge/wx-chart-type-surface-analysis)):
    revisited in s8.2.
    [Reference page](/reference/wx/products/surface-analysis).
  - [Frontal-XC scenario s11.1](/courses/weather-comprehensive/s11.1):
    the worked truth example whose chart we embed below. You can read
    the full scenario after finishing s2 if you want the synoptic
    story end-to-end on one route.

  Read the section to build the picture; you do not need the products
  yet.

  ---

  Pull up tomorrow's surface analysis. You see a
  [cold front](/reference/knowledge/wx-airmasses-and-fronts) sweeping
  east through your route, a high pressure system parked over the
  destination, isobars tightly packed across the middle leg. Without
  reading any [TAF](/reference/knowledge/wx-reading-tafs) or
  METAR, what do you already know about how the day will look?

  This is the synoptic story -- the big-picture air-mass behavior that
  drives every product you'll read in later sections. Get the frame
  right and the products stop being numbers and start being
  confirmations of what you already expected. Get the frame wrong and
  the products are noise: you can read every chart correctly and still
  miss the picture.

  The current surface analysis -- a worked example pulled from the
  frontal-xc-march scenario truth state:

  :::chart slug="wx-scenarios/frontal-xc-march/surface-analysis"
  :::

  Read the chart with the question: where is the air going, and what
  is it carrying with it?

  Now the same scenario projected twelve hours forward -- the prog
  chart. Compare the two side by side. Where has the front moved? Which
  way did the surface low track? Did the high strengthen or weaken? The
  prog answers "where is this going next?" before you ever read a
  TAF:

  :::chart slug="wx-scenarios/frontal-xc-march/prog-12hr"
  :::

  Now put the synoptic picture onto a real route. The XC viewer below
  takes the same frontal-passage truth state and lays it over a
  sectional: a cross-country leg with the airspace, the waypoints, the
  weather chips at each stop, and the per-leg fuel and time. Click a
  waypoint to read its METAR and TAF; click a leg to see the wind
  correction. The point is to feel how the air-mass story you just
  read becomes a concrete go/no-go on a specific flight:

  :::xc-viewer slug="kmem-kmkl-kolv-frontal-march"
  :::

  A worked-truth example: a March cold front sweeping from KSTL east
  through KORD, with the warm sector ahead and post-frontal cP behind.
  Every METAR, every TAF FM group, every AIRMET polygon, every Socratic
  prompt below is derived from the same canonical atmosphere -- so when
  you ask "why is KSPI gusty?" or "why does KORD's TAF carry an FM at
  21Z?" there is a real answer pinned to the truth state, not a
  templated explanation. The full briefing-pack walk-through lives in
  [s11.1, frontal cold-front XC](/courses/weather-comprehensive/s11.1);
  this section uses two charts from that scenario to illustrate the
  air-mass and stability concepts.
steps:

  - code: s2.1
    ordinal: 1
    title: Air masses and fronts
    body_md: |
      An air mass is a body of air with consistent temperature and
      moisture across hundreds of miles. A front is the boundary where
      two of them collide. The character of the front tells you what
      kind of weather you'll get: warm fronts give widespread cloud
      and steady precipitation; cold fronts give narrow bands of
      vigorous lift and embedded thunderstorms; occluded fronts hand
      you the worst of both.

      The framing question: what air mass am I sitting in right now,
      where is it going, and what is replacing it?

      The synoptic picture below is a
      [surface analysis chart](/reference/glossary/surface-analysis-chart)
      -- the WPC's hand-drawn map of surface pressure, fronts, and
      station observations, the lead frame for every preflight
      briefing. The reading skill (decoding the symbol set, interpreting
      isobar spacing, identifying frontal glyphs) is its own node:
      [Reading the Surface Analysis Chart](/reference/knowledge/wx-chart-type-surface-analysis).
    knowledge_node_id: wx-airmasses-and-fronts

  - code: s2.2
    ordinal: 2
    title: Stability and instability
    body_md: |
      Two air parcels at the same altitude can carry wildly different
      flight implications depending on what happens when you nudge one
      upward. Stable air resists vertical motion -- smooth ride,
      [layered clouds](/reference/knowledge/wx-clouds-and-precipitation),
      steady visibility, but trapped pollution and
      [fog](/reference/knowledge/wx-fog-and-visibility-obstructions)
      risk. Unstable air amplifies vertical motion -- bumpy ride,
      cumulus build-ups, showers, and (if it goes far enough)
      [thunderstorms](/reference/knowledge/wx-thunderstorm-hazards).

      The lapse rate is the diagnostic. Lift a parcel; compare its
      cooling rate to the surrounding air. If it stays warmer it keeps
      rising. If it cools faster than the environment it sinks back.
      Stability is a forecast input you'll feel in the airplane within
      minutes of takeoff.
    knowledge_node_id: wx-stability-and-instability
