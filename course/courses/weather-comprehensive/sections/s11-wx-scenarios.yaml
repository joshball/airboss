code: s11
ordinal: 11
title: WX Scenarios
body_md: |
  **Before you start.** This section assumes you have worked through
  s1 through s10. The scenarios use the full vocabulary of the
  course; nothing new is taught here. Each scenario is the synoptic
  story (s2), the products (s7 / s8), and the integrated decision
  (s10) applied to one real-shaped atmosphere.

  If you jump straight to a scenario without the earlier sections,
  the prose will still read, but the
  [Socratic discovery prompts](/reference/knowledge/wx-go-nogo-decision)
  will not land; the prompts assume you can already trace a callout
  back to the air mass, the front, or the hazard polygon that
  produced it. The scenarios are reps; the earlier sections are the
  ground school.

  The four sub-pages in every scenario follow the same shape:

  - **Intro:** the synoptic frame and the decision in front of the
    pilot.
  - **Reading the charts:** chart-by-chart walk through the briefing
    pack ([surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
    ([reference](/reference/wx/products/surface-analysis)),
    [winds aloft](/reference/knowledge/wx-product-winds-aloft)
    ([reference](/reference/wx/products/winds-temps-aloft)),
    [AIRMET](/reference/knowledge/wx-product-airmets)
    ([reference](/reference/wx/products/airmet)) /
    [SIGMET](/reference/knowledge/wx-product-sigmets)
    ([reference](/reference/wx/products/sigmet)),
    [PIREP](/reference/knowledge/wx-product-pireps)
    ([reference](/reference/wx/products/pirep)), and so on).
  - **Analysis:** Socratic discovery prompts that pin each question
    to a named element of the truth model.
  - **Instructor internals:** the TruthModel parameters that produced
    the scenario; not gated, but not required.

  ---

  Six complete pre-flight briefing packs, one per pedagogical archetype.
  Each scenario is generated by a truth-aware engine: the canonical
  atmosphere is authored first, every product (METAR, TAF, AIRMET, FB,
  PIREP) is derived from that single state, and every Socratic prompt
  pins to a named element of it. When you ask "why is KSPI gusty?" the
  answer traces back to a specific air mass, a specific pressure
  gradient, and a specific front in the truth model. Nothing is
  Six complete pre-flight
  [briefing](/reference/knowledge/wx-briefing-execution) packs, one
  per pedagogical archetype. Each scenario is generated by a
  truth-aware engine: the canonical atmosphere is authored first,
  every product
  ([METAR](/reference/knowledge/wx-reading-metars)
  ([reference](/reference/wx/products/metar)),
  [TAF](/reference/knowledge/wx-reading-tafs)
  ([reference](/reference/wx/products/taf)),
  [AIRMET](/reference/knowledge/wx-product-airmets)
  ([reference](/reference/wx/products/airmet)),
  [FB](/reference/knowledge/wx-product-winds-aloft)
  ([reference](/reference/wx/products/winds-temps-aloft)),
  [PIREP](/reference/knowledge/wx-product-pireps)
  ([reference](/reference/wx/products/pirep))) is derived from
  that single state, and every Socratic prompt pins to a named element
  of it. When you ask "why is KSPI gusty?" the answer traces back to a
  specific [air mass](/reference/knowledge/wx-airmasses-and-fronts), a
  specific pressure gradient, and a specific front in the truth model.
  Nothing is templated. Nothing is hand-waved.

  The six scenarios cover the dominant synoptic archetypes a working
  pilot sees through a year of cross-country flying:

  - [s11.1 Frontal cold-front XC, KSTL to KORD](/courses/weather-comprehensive/s11.1):
    classic mid-latitude cold-front passage; warm sector vs
    post-frontal contrast at a glance.
  - [s11.2 Summer pop-up convection, Texas Gulf Coast](/courses/weather-comprehensive/s11.2):
    airmass [thunderstorms](/reference/knowledge/wx-thunderstorm-hazards)
    triggered by an outflow boundary; the decision is timing, not
    avoidance.
  - [s11.3 Winter lake-effect icing, Great Lakes](/courses/weather-comprehensive/s11.3):
    cP air over warm lake water; trapped boundary layer, freezing
    drizzle, the [icing](/reference/knowledge/wx-icing-types-and-avoidance)
    flavor that catches non-FIKI pilots.
  - [s11.4 Lee-side mountain wave, Rockies](/courses/weather-comprehensive/s11.4):
    95-kt jet perpendicular to the divide; severe
    [turbulence](/reference/knowledge/wx-turbulence-types) and a
    [rotor](/reference/knowledge/wx-turbulence-types) cloud you can
    see from the ramp at KDEN.
  - [s11.5 Marine stratus, Pacific Northwest](/courses/weather-comprehensive/s11.5):
    coastal IFR under a subsidence inversion; the bay clogged, the
    Central Valley clear, both within forty miles.
  - [s11.6 Radiation fog, California Central Valley](/courses/weather-comprehensive/s11.6):
    nocturnal LIFR over the valley floor; the diurnal cycle is the
    forecast, and the lifecycle answer is in the mixing height.

  Each lesson is structured the same way: an intro that sets the
  scene and embeds the synoptic chart, a chart-by-chart walk through
  the briefing pack, a Socratic analysis pass that turns the truth
  model into discovery prompts, and an instructor-internals note that
  exposes the TruthModel parameters and the rules that produced the
  callouts. The instructor track is not gated; if you want to see
  the wiring you can.

  These scenarios are early in their authoring. Treat the structure
  as load-bearing; the prose will keep evolving as we walk through
  each one with a CFI.
steps:

  - code: s11.1
    ordinal: 1
    level: lesson
    title: Frontal cold-front XC - KSTL to KORD
    body_md: |
      A March cross-country from St. Louis to Chicago, planned for the
      afternoon a vigorous
      [cold front](/reference/knowledge/wx-airmasses-and-fronts) is
      sweeping east-southeast across the Midwest. Behind the front, cP
      air with a 17-degree temperature drop and a 100-degree wind
      shift. Ahead of the front, mT warm sector with isolated cells
      and tightening pressure gradient. KORD will see frontal passage
      two to four hours after the legs from KSTL begin. This is the
      quintessential synoptic-scale teaching scenario: every product
      on the [briefing](/reference/knowledge/wx-briefing-execution)
      tells the same story, and the story is whether you're racing
      the front or being overtaken by it.

      :::scenario slug="frontal-xc-march"
      :::

      The four sub-pages walk: the intro and synoptic frame, a
      chart-by-chart read of the briefing pack, a Socratic analysis
      that exposes the warm-sector vs cold-sector contrast across the
      products, and the instructor view into how the TruthModel
      produces this scenario.
    steps:
      - code: s11.1.1
        ordinal: 1
        title: Intro - meet the front
        knowledge_node_id: wx-airmasses-and-fronts
        body_md: |
          You are sitting in the FBO at KSTL on a March afternoon. The
          plan is a three-leg cross-country up to KORD with a fuel stop
          at KSPI and a position report over KMLI. Outside the window
          it is 17 C, dewpoint 13, wind 200 at 14: a comfortable
          pre-frontal warm-sector day. The forecaster on the phone
          told you a cold front would cross late afternoon. Looking at
          the [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva),
          the front is currently 100 nautical miles to your west and
          moving 110 at 25 knots. The question in front of you is not
          "is the weather flyable." It is "what is the weather going
          to be at each leg, when, and does the airplane get there
          before the front does."

          The chart below is the synoptic frame. A 996-mb low sits
          over the Upper Midwest; a 1023-mb high anchors the southeast;
          the cold front trails SSE from the low through KSPI, KMLI,
          and on down past KSTL. The isobars pack tightest in the
          cold sector behind the front.

          :::chart slug="wx-scenarios/frontal-xc-march/surface-analysis"
          :::

          A teaser to carry into the next sub-page: KMLI is currently
          reporting wind 320 at 20, gusting. The sun is still up. By
          the textbook gusts die at sunset rule, KMLI should be
          smoothing out in a couple of hours. Will it?
      - code: s11.1.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-product-surface-analysis-and-cva
        body_md: |
          The [briefing](/reference/knowledge/wx-briefing-execution)
          pack for this scenario contains seventeen chart artifacts.
          Six of them carry the load for the
          [go/no-go](/reference/knowledge/wx-go-nogo-decision)
          decision; the rest are corroboration.

          ### Surface analysis (`surface-analysis`)

          Hand-drawn synoptic frame. Two pressure centers (the 996-mb
          low north, the 1023-mb high southeast), the
          [cold front](/reference/knowledge/wx-airmasses-and-fronts)
          trailing SSE, the warm front extending east. Isobar packing
          tells you the [wind](/reference/knowledge/wx-wind-systems)
          speed; isobar curvature tells you the flow direction;
          frontal glyphs tell you which side is advancing.

          :::chart slug="wx-scenarios/frontal-xc-march/surface-analysis"
          :::

          ### 12-hour prog (`prog-12hr`)

          The same atmosphere stepped forward twelve hours. The front
          has translated east, the low has deepened, and the
          pre-frontal convective cells have walked along with the
          band. Read the prog as the answer to "what will the surface
          analysis look like when I am landing at KORD."

          :::chart slug="wx-scenarios/frontal-xc-march/prog-12hr"
          :::

          ### METAR plot (`metar-plot`)

          Station model plots at the route stations.
          [METAR](/reference/knowledge/wx-reading-metars)
          observations from KSTL and KCPS in the warm sector report
          mT signatures (T17 / Td13, southerly winds). KSPI and KMLI
          in the cold sector report cP signatures (T4 / Td-3,
          northwesterly winds with gusts). KORD ahead of the front
          still reads warm-sector.

          :::chart slug="wx-scenarios/frontal-xc-march/metar-plot"
          :::

          ### Winds aloft (`winds-aloft`)

          A 110-kt jet axis runs from the Four Corners north-east to
          the Great Lakes -- the
          [winds aloft](/reference/knowledge/wx-product-winds-aloft)
          product shows the speed gradient on the cold side of the
          jet exit; that is where the FL180 to FL280 chop stacks.

          :::chart slug="wx-scenarios/frontal-xc-march/winds-aloft"
          :::

          ### AIRMET / SIGMET overlay (`airmet-sigmet`)

          Three polygons, all derived from synoptic-truth hazard
          zones. [Sierra](/reference/knowledge/wx-product-airmets)
          for the post-frontal IFR pocket (0-4000 ft MSL), Tango for
          the cold-sector
          [turbulence](/reference/knowledge/wx-turbulence-types)
          column (6000-24000 ft MSL), Tango for the pre-frontal
          convective band (0-30000 ft MSL).

          :::chart slug="wx-scenarios/frontal-xc-march/airmet-sigmet"
          :::

          ### PIREP plot (`pirep-plot`)

          One [pilot report](/reference/knowledge/wx-product-pireps)
          from inside the post-frontal IFR polygon confirms the
          AIRMET Sierra: moderate chop in precip, ceiling OVC020,
          level 6000. Three independent products (synoptic truth,
          AIRMET polygon, PIREP) agree; that is the gold-standard
          pre-flight signal.

          :::chart slug="wx-scenarios/frontal-xc-march/pirep-plot"
          :::

          The
          [freezing-level](/reference/knowledge/wx-freezing-level),
          CVA, [GFA](/reference/knowledge/wx-product-gfa), and
          per-station TAF charts are in the bundle and worth scanning
          (they fill in the three-dimensional picture), but the six
          above carry the frame.
      - code: s11.1.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-reading-metars
        body_md: |
          The truth-aware engine produces a Socratic callout for each
          element of the briefing that carries decision weight. The
          questions below are pinned to specific named features of
          the scenario; the answers trace back to the canonical
          atmosphere. Treat them as discovery prompts; form your
          own answer first, then compare.

          ### KSPI and KMLI: what changed when the front crossed?

          KSPI now reads T4 / Td-3, wind 320 at 20, stable. The
          warm-sector stations read T17 / Td13, wind 200 at 14,
          conditionally unstable. Every variable shifted at once:
          temperature down 13 degrees, dewpoint down 16, wind 120
          degrees right. Why did so many things move together? Because
          the [air mass](/reference/knowledge/wx-airmasses-and-fronts)
          over the field is different. The F-cold-main front already
          crossed both stations; the cP air now over them replaces the
          mT sector that was there before passage. Every change traces
          back to one event.

          ### KCPS pre-frontal winds at 200/14: where is that flow from?

          The 996-mb low sits north; the 1023-mb high sits southeast.
          Surface flow circulates around the low, drawing southerly
          air up from the Gulf source region into the warm sector.
          The pressure gradient between low and high tightens as the
          front approaches; the wind speed is non-trivial despite
          the calm-feeling warm-sector skies.

          ### KMLI gusting at 320/20 on a clear post-frontal afternoon:
          shouldn't the gusts die with the sun?

          Two sources keep the gusts active. First, L-upper-midwest
          is deepening; isobars pack tighter behind a deepening
          trough, so the geostrophic
          [wind](/reference/knowledge/wx-wind-systems) speeds up.
          Second, cold advection in the cP sector keeps the boundary
          layer well-mixed; mid-level momentum couples down to the
          surface as gusts. The gusts-die-at-sunset heuristic applies
          in [stable](/reference/knowledge/wx-stability-and-instability)
          air. In active cold advection it does not. The textbook
          rule has a precondition; the truth model exposes when the
          precondition fails.

          ### KORD TAF FM21Z: what does the FM group mean for arrival?

          KORD is currently 66 km from F-cold-main. The FM group
          marks the forecast time the front reaches the field
          (motion 110 at 25 knots). Arrive before FM21Z and the
          airport stays in mT conditions. Arrive after and you are
          landing in the post-frontal regime: lower ceiling, gusty
          wind from the northwest, denser and colder air. The
          go/no-go decision is timing, not weather minimums.

          ### AIRMET Sierra polygon and PIREP corroboration

          The KSPI [PIREP](/reference/knowledge/wx-product-pireps)
          reports OVC020 with moderate chop in precipitation inside
          the post-frontal IFR polygon. Independent confirmation: the
          synoptic truth (post-frontal cold-sector IFR under a stable
          inversion), the
          [AIRMET](/reference/knowledge/wx-product-airmets)
          polygon derived from that hazard zone, and the pilot report
          from inside it all say the same thing. Treat convergent
          independent evidence as confirmation, not coincidence.

          ### Jet-exit chop at FL240+

          The 110-kt jet axis (Four Corners to Great Lakes) feeds an
          exit region where ageostrophic flow descends and accelerates
          on the cold side. On the cP sector side, post-frontal
          pressure rise reinforces the descent. Expect chop concentrated
          in the FL180-FL280 band aligned with the axis.

          ### Pre-frontal cells C-prefront-1 and C-prefront-2

          Cell C-prefront-1 at 38.0N / 89.0W carries a 48-dBZ peak;
          C-prefront-2 at 36.0N / 88.5W carries 42 dBZ. Both sit
          inside the pre-frontal Tango polygon. Cells in this dBZ
          range carry updraft chop in the rain core,
          [microburst](/reference/knowledge/wx-thunderstorm-hazards)
          risk at the leading edge, and embedded lightning. Stay 40
          to 50 km clear at flight altitudes the AIRMETs cover.

          :::chart slug="wx-scenarios/frontal-xc-march/prog-12hr"
          :::
      - code: s11.1.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-airmasses-and-fronts
        body_md: |
          A teacher / course-author view into how this scenario is
          generated. None of this is required to fly the briefing
          decision; it exists so you can see the wiring and trust
          the answers.

          ### Source

          The canonical atmosphere lives at
          `libs/wx-engine/src/truth/scenarios/frontal-xc-march.ts`.
          It is a single TruthModel literal: pressure systems, fronts,
          air-mass polygons, upper-level wind profile, convective
          cells, hazard zones, route stations. Every product in the
          bundle ([METARs, TAFs](/reference/knowledge/wx-reading-metars),
          [AIRMETs](/reference/knowledge/wx-product-airmets),
          [FB](/reference/knowledge/wx-product-winds-aloft),
          [PIREPs](/reference/knowledge/wx-product-pireps)) is derived
          from this one state by the layer-2 product modules under
          `libs/wx-engine/src/products/`. The 17 chart artifacts are
          rendered from the same state via `libs/wx-engine/src/charts/`.

          ### Three tunable parameters worth knowing

          - `synoptic.pressureSystems[0].centralPressureMb: 996`. The
            depth of the low drives the pressure gradient, the
            isobar packing, and the post-frontal wind speed. Move it
            to 988 and the gusts at KMLI step up; move it to 1004
            and the warm-sector wind softens.
          - `synoptic.fronts[0].motionKt: 25`. The front speed sets
            the timing of the FM groups in every downstream TAF.
            Slow the front to 15 kt and the KORD FM21Z becomes
            FM23Z; the arrival-timing question changes.
          - `convection.capeJperKgByStation.KSTL: 800`. CAPE at the
            warm-sector stations drives the pre-frontal cell
            decision. Drop it below 500 and the Tango pre-frontal
            polygon shrinks; raise it above 1500 and the cells get
            more vertical extent.

          ### What produced each callout

          The Socratic callouts in s11.1.3 come from the rule set at
          `libs/wx-engine/src/commentary/socratic.ts`. Each rule
          looks for a specific shape in the truth model (a station
          inside a hazard polygon, a TAF FM transition aligned with
          a front passage, a jet axis adjacent to a pressure
          gradient) and emits a question pinned to the named element
          it matched. Nothing is authored prose. Every reason field is
          generated from the underlying truth.

          ### Authored vs derived

          100 percent of the briefing is derived. The author writes
          the TruthModel literal. The engine writes everything else.
          That is the invariant the scenario test suite enforces at
          `libs/wx-engine/src/validate/round-trip.ts`: any field that
          appears in a product can be traced back to a field in the
          TruthModel.

          ### Next iteration

          The current truth model is a single time snapshot. The next
          iteration adds a time-advance operator (see
          `libs/wx-engine/src/truth/advance.ts`) so the engine can
          step the scenario forward an hour at a time and re-derive
          every product. Once that lands, the same scenario yields a
          twelve-step replay you can scrub through; the FM groups in
          the TAF stop being annotations and start being inputs to a
          live forecast clock.

  - code: s11.2
    ordinal: 2
    level: lesson
    title: Summer pop-up convection - Texas Gulf Coast
    body_md: |
      A July afternoon along the upper Texas coast. A weak surface
      ridge sits over central Texas; a weak trough sits offshore. The
      inland mT [air mass](/reference/knowledge/wx-airmasses-and-fronts)
      carries enormous
      [CAPE](/reference/knowledge/wx-stability-and-instability) (3500
      J/kg at KAUS, 3800 at KIAH); a stationary outflow boundary along
      the upper coastal plain triggers four mature
      [cells](/reference/knowledge/wx-thunderstorm-hazards) along the
      KAUS to KIAH corridor. The decision in front of the pilot is
      not "is the weather flyable." It is "can the cells be threaded,
      and if not, what is the divert?"

      :::scenario slug="summer-thunderstorms-tx"
      :::

      The four sub-pages walk the intro and the cell line, a
      chart-by-chart read of the briefing pack, a Socratic analysis
      of the convection (CAPE, outflow boundary, anvil icing), and
      the instructor view into how the TruthModel parameterizes
      air-mass thunderstorms.
    steps:
      - code: s11.2.1
        ordinal: 1
        title: Intro - the cell line
        knowledge_node_id: wx-thunderstorm-hazards
        body_md: |
          You are at KSAT mid-afternoon planning a flight east to
          KIAH. The [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
          is unremarkable: a weak ridge overhead, a weak trough
          offshore, no real
          [fronts](/reference/knowledge/wx-airmasses-and-fronts). The
          surface plot says VFR everywhere within 200 miles. But the
          [convective outlook](/reference/knowledge/wx-product-convective-outlook)
          tells a different story: a stationary outflow boundary
          along the upper coastal plain has parked itself between
          KAUS and KIAH, and four mature cells stand along it. Two
          carry 55-dBZ peaks. The afternoon is the forecast:
          [CAPE](/reference/knowledge/wx-stability-and-instability)
          peaks now, the cells are mature now, and the
          [go/no-go](/reference/knowledge/wx-go-nogo-decision) is
          timing-dependent.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/surface-analysis"
          :::

          The teaser to carry into the next sub-page: KSAT's wind is
          130 at 10 on a "calm" afternoon. The surface analysis
          shows essentially no synoptic forcing. Where is the 10-knot
          wind coming from?
      - code: s11.2.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-product-convective-outlook
        body_md: |
          The [briefing](/reference/knowledge/wx-briefing-execution)
          pack carries the same seventeen artifacts as the frontal
          scenario. For convective afternoons the load shifts to the
          convective products and the
          [freezing level](/reference/knowledge/wx-freezing-level).

          ### Surface analysis (`surface-analysis`)

          The ridge / trough framework. Note how little the
          [synoptic map](/reference/knowledge/wx-product-surface-analysis-and-cva)
          tells you about the cells; this is the trap of weak
          synoptic-forcing convection.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/surface-analysis"
          :::

          ### Convective outlook (`convective-outlook`)

          The product that names the cells. SPC outlook polygons
          cover the upper coastal plain corridor. This is the chart
          that decides the go/no-go for an afternoon flight in the
          summer.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/convective-outlook"
          :::

          ### 12-hour prog (`prog-12hr`)

          The cells projected forward. The cell positions on this
          chart drive the rerouting decision; cells in the prog
          carry the outflow boundary's track with them.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/prog-12hr"
          :::

          ### Freezing level (`freezing-level`)

          The freezing level is high (mid-teens) in July. The
          AIRMET Zulu band (12000-25000 ft MSL) sits above it
          because that is where the anvil supercooled liquid lives.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/freezing-level"
          :::

          ### AIRMET / SIGMET overlay (`airmet-sigmet`)

          Four hazards stacked:
          [Tango](/reference/knowledge/wx-product-airmets) for
          the convective
          [turbulence](/reference/knowledge/wx-turbulence-types)
          column (0-15000 ft MSL), Tango for the low-level outflow
          mechanical turbulence (0-6000 ft MSL), Zulu for the anvil
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          band (12000-25000 ft MSL), Sierra for the LIFR pockets
          directly under the cells (0-3000 ft MSL).

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/airmet-sigmet"
          :::

          ### PIREP plot (`pirep-plot`)

          A KAUS [PIREP](/reference/knowledge/wx-product-pireps) from
          FL090 reports moderate chop 070-110 in TSRA near a cell.
          Convergent with the AIRMET Tango polygon and the
          cell-feature truth.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/pirep-plot"
          :::
      - code: s11.2.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-thunderstorm-hazards
        body_md: |
          The Socratic prompts for this scenario center on convective
          structure: where do you stay clear, how far, why those
          numbers, and what does the freezing level do to the icing
          band?

          ### KSAT's 130/10 on a "calm" afternoon

          The 1018-mb ridge and the 1010-mb offshore trough generate
          a modest 8-mb gradient across the Gulf coast. Surface flow
          circulates clockwise around the ridge; KSAT sits on the
          southern flank and gets southeasterly maritime flow even
          though the synoptic map looks quiet. The trap: pilots
          looking at the [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
          read "no wind" and miss the gradient that is delivering
          moisture to the inland mT
          [mass](/reference/knowledge/wx-airmasses-and-fronts).

          ### Why 55 dBZ matters

          Cells C-aus-east, C-corridor-mid, and C-iah-south all
          carry 55-dBZ peaks. Above 50 dBZ, the cell extends to the
          tropopause; below 50, it tops out under the anvil. The
          [AIRMET Zulu](/reference/knowledge/wx-product-airmets)
          band 12000-25000 ft MSL exists because the cells stack the
          supercooled liquid that high. Three concrete hazards at the
          cell: updraft
          [turbulence](/reference/knowledge/wx-turbulence-types)
          inside the rain core, downdraft / microburst risk at the
          leading edge, embedded lightning. Stay 36-40 km clear at
          flight altitudes the AIRMETs cover.

          ### AIRMET Sierra under the cells

          A Sierra polygon for a LIFR pocket 0-3000 ft MSL is the
          rain shaft, not a stratus deck. Heavy rain blocks
          visibility; the polygon covers exactly the footprint where
          the cell's precip falls heavily enough to drop visibility
          below 3 SM. Sierra polygons normally cover broad stratus
          decks; this one is a convective artifact, and it dies when
          the cell dies.

          ### Anvil icing: why above the freezing level

          The AIRMET Zulu polygon covers 12000-25000 ft MSL. Below
          12000 the precipitation is liquid; supercooled liquid only
          appears where the temperature is below 0 C, and the
          [freezing level](/reference/knowledge/wx-freezing-level) on
          this chart is high. Above ~-15 C (about 25000 ft) most
          droplets glaciate; ice does not accrete on the airframe
          once the cloud is glaciated. The
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          band is bounded by physics, not by an authoring choice.

          ### AIRMET Tango: outflow boundary vs convective column

          Two Tango polygons stack in this scenario. The 0-6000 ft
          one covers the mechanical turbulence right along the
          stationary outflow boundary. The 0-15000 ft one covers
          the convective column above the cells. They serve
          different missions: the outflow Tango tells you it is
          bumpy along the boundary even between cells; the column
          Tango tells you the chop is continuous from surface to
          AIRMET top inside the cell footprint.

          ### KAUS PIREP corroboration

          The KAUS [pilot report](/reference/knowledge/wx-product-pireps)
          from FL090 in TSRA confirms the Tango polygon. Convergent
          independent evidence: synoptic truth (outflow boundary, mT
          mass with 3500 J/kg
          [CAPE](/reference/knowledge/wx-stability-and-instability)),
          AIRMET polygon, pilot report.

          :::chart slug="wx-scenarios/summer-thunderstorms-tx/airmet-sigmet"
          :::
      - code: s11.2.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-thunderstorm-hazards
        body_md: |
          ### Source

          `libs/wx-engine/src/truth/scenarios/summer-thunderstorms-tx.ts`.
          The TruthModel literal carries four convective cells with
          named ids (C-aus-east, C-corridor-mid, C-cll-near,
          C-iah-south), a stationary outflow boundary, and per-station
          CAPE that drives the convective-outlook polygon shape.

          ### Three tunable parameters

          - `convection.capeJperKgByStation.KIAH: 3800`. CAPE at the
            convective stations drives the cell vertical extent and
            the AIRMET Zulu band. Drop it below 1500 and the cells
            become showers; raise it above 4000 and the supercell
            outlook activates.
          - `convection.cells[0].peakDbz: 55`. The 50-dBZ cutoff
            determines whether the cell reaches the tropopause.
            Cells at 50+ produce the embedded-turbulence + lightning
            + microburst hazard triad; cells at 45 do not.
          - `diurnal.solarNoonUtcHour: 17`. The diurnal cycle drives
            the lifecycle: cells fire mid-afternoon, peak around
            21Z, decay after sunset. Shift the solar noon and the
            scenario becomes a different time of day.

          ### What produced each callout

          The cell-feature callouts come from a rule that walks every
          convective cell, computes its overlap with the hazard
          polygons (geometric containment), and emits a question
          pinned to the named cell + named polygons. Same rule set
          as in s11.1; different truth literal gives different
          callouts.

          ### Authored vs derived

          100 percent derived. The four cells are authored; everything
          else (which [AIRMETs](/reference/knowledge/wx-product-airmets)
          cover them, which
          [PIREPs](/reference/knowledge/wx-product-pireps) corroborate,
          which [TAFs](/reference/knowledge/wx-reading-tafs)
          carry FM groups, what each METAR reports) falls out of the
          truth state.

          ### Next iteration

          The current scenario is a static snapshot. The next iteration
          carries cell motion vectors so the cells walk along the
          outflow boundary, and the AIRMET polygons translate with
          them. The KAUS PIREP becomes one moment in a moving picture
          instead of one moment in a still photo.

  - code: s11.3
    ordinal: 3
    level: lesson
    title: Winter lake-effect icing - Great Lakes
    body_md: |
      A January morning over the Great Lakes. A 1004-mb low has just
      departed eastward; a 1028-mb Canadian high is pushing in behind.
      cP [air](/reference/knowledge/wx-airmasses-and-fronts) pours
      over the still-warm waters of Lake Erie; downwind (south and
      southeast of the lake) the boundary layer saturates and a
      freezing-precip
      [stratus](/reference/knowledge/wx-clouds-and-precipitation) band
      traps KCLE and KCAK in IFR with moderate
      [rime](/reference/knowledge/wx-icing-types-and-avoidance). KORD,
      KDTW, and KGRR sit in clearer cP air west of the band but still
      inside the post-frontal
      [turbulence](/reference/knowledge/wx-turbulence-types) column.
      The icing here is the flavor that catches non-FIKI pilots:
      cloud-tops at 8000 ft MSL, ceilings at 500 ft AGL, and freezing
      drizzle in the column.

      :::scenario slug="winter-icing-great-lakes"
      :::

      The four sub-pages walk: the intro and the cP / lake interaction,
      a chart-by-chart read of the briefing pack, a Socratic analysis
      of the lake-effect icing band, and the instructor view into how
      the TruthModel renders lake-effect physics.
    steps:
      - code: s11.3.1
        ordinal: 1
        title: Intro - cP air over warm water
        knowledge_node_id: wx-icing-types-and-avoidance
        body_md: |
          You are at KGRR planning a flight east to KCLE. Outside it
          is -10 C, dewpoint -15, wind 330 at 18, sky clear. The
          [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
          tells you a low has just departed east and a Canadian high
          is pushing in behind. By the textbook the flying weather is
          "post-frontal clear and bumpy." But Lake Erie sits between
          you and KCLE. The lake is still warm from autumn (the water
          is slower to cool than the land), and the cP
          [air](/reference/knowledge/wx-airmasses-and-fronts) pouring
          over it is going to saturate downwind. The forecast shows a
          lake-effect band trapping KCLE and KCAK in IFR with moderate
          rime. The decision in front of you is whether to cross the
          band, route around it to the south, or stop short.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/surface-analysis"
          :::

          The teaser to carry into the next sub-page: KCLE's
          [METAR](/reference/knowledge/wx-reading-metars) shows
          OVC005 and freezing drizzle. The cloud tops are at 8000 ft
          MSL. Could a non-FIKI airplane climb over the band?
      - code: s11.3.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-freezing-level
        body_md: |
          The lake-effect
          [briefing](/reference/knowledge/wx-briefing-execution) leans
          on the freezing level, the
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          [AIRMET](/reference/knowledge/wx-product-airmets),
          and the [GFA](/reference/knowledge/wx-product-gfa) to show
          the trapped layer.

          ### Surface analysis (`surface-analysis`)

          The 1028-mb high and the departing 1004-mb low; isobars
          packed across the lakes drive 330 at 18 cP flow over the
          warm water.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/surface-analysis"
          :::

          ### Freezing level (`freezing-level`)

          The freezing level is at the surface for this scenario
          (cP air well below 0 C). That puts the entire AIRMET Zulu
          band (0-8000 ft MSL) in the icing column; there is no
          "warm cushion" below cloud base to shed accumulation
          before landing.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/freezing-level"
          :::

          ### Graphical Forecast for Aviation (`gfa`)

          The GFA shows the lake-effect band as a uniform low
          ceiling polygon; KCLE and KCAK in IFR, KORD / KDTW / KGRR
          west of the band in MVFR.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/gfa"
          :::

          ### G-AIRMET icing (`g-airmet-icing`)

          Two icing polygons: HZ-lake-effect-zulu (0-8000 ft MSL)
          for the lake-effect band rime, and HZ-east-of-band-zulu
          (5000-12000 ft MSL) for the lighter cP cloud-deck icing
          east of the band.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/g-airmet-icing"
          :::

          ### G-AIRMET turbulence (`g-airmet-turbulence`)

          One Tango polygon for the post-frontal cold-advection
          boundary layer (0-8000 ft MSL). Even outside the icing
          band the cP boundary layer is bumpy with
          [turbulence](/reference/knowledge/wx-turbulence-types).

          :::chart slug="wx-scenarios/winter-icing-great-lakes/g-airmet-turbulence"
          :::

          ### PIREP plot (`pirep-plot`)

          A [pilot report](/reference/knowledge/wx-product-pireps)
          from inside the lake-effect band confirms moderate rime and
          OVC005. Three-product agreement: GFA, icing AIRMET, PIREP.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/pirep-plot"
          :::
      - code: s11.3.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-icing-types-and-avoidance
        body_md: |
          ### Why the band exists

          cP air pouring over the still-warm lake picks up moisture
          and heat from the water; the boundary layer saturates and
          [stratus](/reference/knowledge/wx-clouds-and-precipitation)
          forms. Downwind of the lake (south and southeast, following
          the cP flow vector) the band concentrates. The
          [AIRMET Zulu](/reference/knowledge/wx-product-airmets)
          source field names this exactly: cP air saturates over the
          still-warm lake; moderate rime in the freezing-drizzle
          column.

          ### Why "climb over" does not work

          Cloud tops at 8000 ft MSL. A non-FIKI piston aircraft can
          climb that high, but the ascent is through the icing
          column. By the time you break out you have accumulated the
          rime that was supposed to be optional. Freezing drizzle in
          particular accretes faster than the airframe certification
          envelope contemplates. The "climb over" option requires
          either FIKI equipment or a
          [freezing level](/reference/knowledge/wx-freezing-level)
          above the cloud tops; neither applies here.

          ### Freezing drizzle vs freezing rain

          The hazard source names freezing drizzle. Drizzle droplets
          are smaller than rain droplets, so they freeze on contact
          across more of the airframe (not just the leading edges).
          Pneumatic boots that handle freezing rain do not always
          shed drizzle accumulation. This is the icing flavor that
          dispatches non-FIKI airplanes back to the ramp.

          ### Two icing polygons, not one

          HZ-lake-effect-zulu (0-8000 ft MSL) covers the lake-effect
          band. HZ-east-of-band-zulu (5000-12000 ft MSL) covers a
          lighter icing layer in the cP cloud deck east of the band.
          They are different mechanisms: the band is convergence-fed
          stratus over warm water; the east-of-band layer is
          large-scale cP cloud at mid levels. Same hazard category
          (icing), different cause, different altitude band.

          ### Post-frontal Tango outside the band

          HZ-postfrontal-tango (0-8000 ft MSL) covers the cold-
          advection boundary layer west of the band. KORD / KDTW /
          KGRR sit inside this column. Clear skies plus moderate
          chop is the cP signature; the heuristic "clear means
          smooth" fails in cold advection where surface
          [turbulence](/reference/knowledge/wx-turbulence-types)
          stays active.

          ### KCLE PIREP corroboration

          A [pilot report](/reference/knowledge/wx-product-pireps)
          from inside the band confirms moderate rime in cloud with
          OVC005. Convergent independent evidence:
          [GFA](/reference/knowledge/wx-product-gfa) polygon, icing
          [AIRMET](/reference/knowledge/wx-product-airmets)
          polygon, pilot report from inside the polygon. Treat this
          as confirmation, not coincidence; do not cross the band.

          :::chart slug="wx-scenarios/winter-icing-great-lakes/g-airmet-icing"
          :::
      - code: s11.3.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-icing-types-and-avoidance
        body_md: |
          ### Source

          `libs/wx-engine/src/truth/scenarios/winter-icing-great-lakes.ts`.
          Two air-mass polygons (the cP post-frontal mass and the mT
          pre-frontal mass that has just departed east) plus the
          lake-effect band as a polygon shape. The lake itself is
          not yet a first-class object in the truth model; the
          downwind band is currently authored as a hazard polygon
          rather than derived from a lake + flow geometric operation.

          ### Three tunable parameters

          - `airMasses[AM-postfrontal-cP].meanCloudTopFtAgl: 8000`.
            The cap on the lake-effect band. Raise it to 12000 and
            the "climb over" option becomes plausible; raise it to
            16000 and the GFA polygon stops being IFR.
          - `airMasses[AM-postfrontal-cP].surfaceTempC: -10`. The
            cP source temperature drives the lake-air delta. Warmer
            cP (closer to 0 C) reduces saturation; colder cP
            intensifies the band.
          - `hazardZones[HZ-lake-effect-zulu].severity: moderate`.
            The Zulu polygon severity drives the AIRMET wording.
            Moderate rime in the column at 100 KIAS for a piston
            airframe is a non-FIKI ramp call.

          ### What produced each callout

          The icing callouts come from a rule that walks every icing
          hazard zone and emits a question pinned to the named
          polygon + the air-mass parameters that produced it. The
          turbulence callout for the post-frontal column uses the
          same rule that ran in s11.1 against a different hazard
          shape.

          ### Authored vs derived

          The lake is implicit (a stand-in polygon rather than a
          first-class lake geometry). Everything else is derived
          from the truth literal: the
          [METARs](/reference/knowledge/wx-reading-metars) report
          the [air mass](/reference/knowledge/wx-airmasses-and-fronts)
          they sit in, the TAFs carry the FM groups for the front's
          passage, the
          [AIRMETs](/reference/knowledge/wx-product-airmets)
          trace from the hazard polygons, and the
          [PIREPs](/reference/knowledge/wx-product-pireps) are placed
          inside the polygons they corroborate.

          ### Next iteration

          Add lake geometry as a first-class object so the band is
          derived (not authored) from cP flow vector + lake polygon
          + lake / air temperature delta. That unlocks the same
          scenario at different lake temperatures (early vs late
          winter) without re-authoring the band polygon every time.

  - code: s11.4
    ordinal: 4
    level: lesson
    title: Lee-side mountain wave - Rockies
    body_md: |
      A winter morning east of the Front Range. A 1024-mb high sits
      over the Great Basin; a 1008-mb lee trough sits east of the
      divide. The pressure gradient drives strong westerly flow at
      the surface; a 95-kt jet axis aloft locks in westerly flow
      perpendicular to the ridgeline from 9000 ft up. Standing
      [waves](/reference/knowledge/wx-turbulence-types) east of the
      divide carry severe
      [turbulence](/reference/knowledge/wx-turbulence-types) from the
      surface to FL280; a rotor cloud parks at 5000-12000 ft MSL in
      the lee. KASE sits high on the windward slopes; KDEN / KCOS /
      KBJC / KAPA cluster east of the divide along the I-25 corridor,
      directly under the wave column.

      :::scenario slug="mountain-wave-rockies"
      :::

      The four sub-pages walk: the intro and the wave geometry, a
      chart-by-chart read of the briefing pack, a Socratic analysis
      of the wave / rotor / jet system, and the instructor view into
      how the TruthModel parameterizes orographic flow.
    steps:
      - code: s11.4.1
        ordinal: 1
        title: Intro - the wave column
        knowledge_node_id: wx-turbulence-types
        body_md: |
          You are at KAPA, southeast of Denver, planning a flight
          west toward KASE. Looking northwest you can see a rotor
          cloud at 8000 ft, parked stationary east of the divide.
          The [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
          shows no [fronts](/reference/knowledge/wx-airmasses-and-fronts)
          within 500 miles, but the
          [winds-aloft chart](/reference/knowledge/wx-product-winds-aloft)
          reads 270 at 95 kt at FL340. Westerly flow perpendicular to
          a 14000-ft ridgeline is the mountain-wave generator: the air
          can't go through the ridge, so it goes over it, and the
          standing wave propagates downwind for hundreds of miles.
          The decision in front of you is whether to fly through the
          wave column at all, and if so, at what altitude and what
          airspeed.

          :::chart slug="wx-scenarios/mountain-wave-rockies/surface-analysis"
          :::

          The teaser to carry into the next sub-page: the
          [AIRMET](/reference/knowledge/wx-product-airmets)
          Tango polygon covers 0 to 28000 ft MSL. There is no "fly
          high to get above it." Why does the turbulence reach
          almost to the tropopause?
      - code: s11.4.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-product-winds-aloft
        body_md: |
          The
          [mountain-wave](/reference/knowledge/wx-turbulence-types)
          [briefing](/reference/knowledge/wx-briefing-execution) leans
          on the winds-aloft chart and the
          [AIRMET Tango](/reference/knowledge/wx-product-airmets)
          polygon. Synoptic-scale charts look deceptively clean.

          ### Surface analysis (`surface-analysis`)

          A pressure dipole: 1024-mb high over the Great Basin,
          1008-mb lee trough east of the divide. The 16-mb gradient
          drives the surface westerly flow. No
          [fronts](/reference/knowledge/wx-airmasses-and-fronts); the
          synoptic map looks quiet.

          :::chart slug="wx-scenarios/mountain-wave-rockies/surface-analysis"
          :::

          ### Winds aloft (`winds-aloft`)

          The chart that decides the go/no-go. The 95-kt jet axis
          runs from Nevada east through Colorado into Kansas, at
          FL340. The 9000-ft wind is 270 at 55, the 12000-ft wind
          is 275 at 60, the 18000-ft wind is 270 at 70. Westerly
          flow perpendicular to the divide, accelerating with
          height, is the textbook mountain-wave setup.

          :::chart slug="wx-scenarios/mountain-wave-rockies/winds-aloft"
          :::

          ### G-AIRMET turbulence (`g-airmet-turbulence`)

          One Tango polygon for the lee-wave column: 0 to 28000 ft
          MSL, severe. The altitude range tells you climbing is
          not an avoidance strategy.

          :::chart slug="wx-scenarios/mountain-wave-rockies/g-airmet-turbulence"
          :::

          ### G-AIRMET icing (`g-airmet-icing`)

          A Zulu polygon for the
          [rotor](/reference/knowledge/wx-turbulence-types) cloud:
          5000 to 12000 ft MSL, moderate. Supercooled drops trapped
          in the rotor circulation accumulate fast on airframe
          surfaces -- the
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          flavor that punishes a wave column traverse.

          :::chart slug="wx-scenarios/mountain-wave-rockies/g-airmet-icing"
          :::

          ### AIRMET / SIGMET overlay (`airmet-sigmet`)

          Three polygons stacked: the wave-column Tango (0-28000),
          the rotor Zulu (5000-12000), and a Sierra for mountain
          obscuration upwind in the mP air piling against the
          Front Range.

          :::chart slug="wx-scenarios/mountain-wave-rockies/airmet-sigmet"
          :::

          ### PIREP plot (`pirep-plot`)

          A KASE [pilot report](/reference/knowledge/wx-product-pireps)
          confirms severe turbulence in the wave column. Convergent
          with the AIRMET Tango and the synoptic geometry.

          :::chart slug="wx-scenarios/mountain-wave-rockies/pirep-plot"
          :::
      - code: s11.4.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-turbulence-types
        body_md: |
          ### Why the wave column reaches 28000 ft

          A standing wave's vertical wavelength is set by
          [stability](/reference/knowledge/wx-stability-and-instability)
          and [wind](/reference/knowledge/wx-wind-systems) speed.
          Strong winds plus a stable atmosphere give a long vertical
          wavelength; the wave amplitude persists high above the
          ridge. The 95-kt jet axis at FL340 anchors the upper
          boundary of the column. Below the jet the westerly flow
          accelerates with height in lockstep; that vertical wind
          profile is the mountain-wave generator. "Climb above the
          chop" works for
          [thunderstorm](/reference/knowledge/wx-thunderstorm-hazards)
          anvils and frontal turbulence. It does not work for a wave
          column tied to a jet.

          ### The rotor and where it lives

          Downwind of the ridge, on the descending side of the lee
          wave, the flow can detach into a stationary rotor: a
          horizontal-axis vortex parked in the lee. The rotor is
          visible (it has its own cloud at 5000-12000 ft MSL) and
          carries severe shear, severe turbulence, and supercooled
          liquid water. Cross the rotor cloud at low altitude and
          you get the full hazard stack at once. The avoidance rule:
          stay out of the rotor cloud, and stay out of the altitude
          band the AIRMET Zulu covers.

          ### Why the rotor traps icing

          Supercooled drops in the rotor circulate without falling
          out as precipitation. The rotor is a cycling vortex: the
          drops re-encounter the lift cycle before they grow large
          enough to precipitate. The result is a persistent reservoir
          of supercooled liquid trapped in a stationary cloud
          feature. Standard
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          avoidance (stay below the
          [freezing level](/reference/knowledge/wx-freezing-level))
          does not apply: the rotor straddles the freezing level by
          design.

          ### Mountain obscuration upwind

          The [Sierra](/reference/knowledge/wx-product-airmets)
          polygon covers the upwind side of the divide where the
          orographic
          [stratus](/reference/knowledge/wx-clouds-and-precipitation)
          and snow showers obscure the ridgeline. Mountain
          obscuration is its own AIRMET family and its own hazard:
          you cannot see the terrain, and the terrain rises into the
          cloud. VFR is locked out west of the ridge.

          ### KASE PIREP corroboration

          A KASE [pilot report](/reference/knowledge/wx-product-pireps)
          from the wave column reports severe turbulence in the band
          the AIRMET Tango covers. Convergent independent evidence:
          synoptic truth (jet axis, pressure gradient, terrain),
          AIRMET polygon, pilot report.

          ### Surface wind at KAPA

          The 16-mb pressure gradient between Great Basin high and
          lee trough drives strong westerly flow at the surface.
          KAPA's [METAR](/reference/knowledge/wx-reading-metars)
          reads westerly with gusts: this is downslope flow
          accelerated by the wave's first descending leg. Surface
          gusts in a lee location with no front nearby are the wave
          signature at ground level.

          :::chart slug="wx-scenarios/mountain-wave-rockies/winds-aloft"
          :::
      - code: s11.4.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-turbulence-types
        body_md: |
          ### Source

          `libs/wx-engine/src/truth/scenarios/mountain-wave-rockies.ts`.
          The Front Range ridge is a first-class terrain object
          (`terrain.ridges[R-front-range]` with peakElevationFt
          14000). The wave column and rotor are authored as hazard
          polygons; the upper-level wind profile drives the
          AIRMET Tango altitude bound.

          ### Three tunable parameters

          - `upperLevel.jetMaxKt: 95`. Drop the jet to 60 and the
            wave amplitude weakens; the AIRMET Tango polygon
            shrinks vertically. Raise it to 130 and the column
            extends past FL300 and the rotor intensifies.
          - `synoptic.pressureSystems[L-lee-trough].centralPressureMb:
            1008` vs `H-great-basin: 1024`. The 16-mb gradient
            drives the surface flow speed perpendicular to the
            ridge. Narrow the gradient and the surface wind drops;
            the wave still exists but the lower turbulence layer
            weakens.
          - `terrain.ridges[0].peakElevationFt: 14000`. The
            ridgeline elevation sets the wavelength's lower bound.
            A 10000-ft ridge with the same flow produces a smaller
            wave.

          ### What produced each callout

          The wave-column Tango callout comes from a rule that looks
          for ridge geometry + perpendicular jet axis + adjacent
          high / low gradient. The rotor Zulu callout comes from a
          rule that looks for a lee-wave hazard zone with icing
          kind. Same authoring layer as s11.1 / s11.2 / s11.3;
          different truth state surfaces different rules.

          ### Authored vs derived

          The ridge geometry is authored; the wave column polygon is
          authored (the geometry of standing-wave amplitude vs ridge
          shape is not yet a first-class derivation). The rotor
          polygon and the upwind mountain obscuration are authored.
          Everything downstream
          ([METARs](/reference/knowledge/wx-reading-metars),
          [AIRMETs](/reference/knowledge/wx-product-airmets),
          [PIREPs](/reference/knowledge/wx-product-pireps), charts) is
          derived.

          ### Next iteration

          Derive the wave column from ridge polyline + wind profile
          + stability. That unlocks the same scenario at different
          wind speeds without re-authoring the polygon every time,
          and it adds the missing physics constraint (no wave
          without stability + perpendicular flow + ridge above a
          threshold height).

  - code: s11.5
    ordinal: 5
    level: lesson
    title: Marine stratus - Pacific Northwest
    body_md: |
      A summer morning along the central California coast. A 1024-mb
      Pacific high sits offshore; a 1014-mb thermal low sits over the
      Great Basin. The post-frontal marine mP air blankets KMRY,
      KSFO, and KOAK in IFR with a 800-ft AGL ceiling under a
      subsidence inversion. East of the Coast Range, the inland mT
      mass subsides and keeps KSCK and KSAC clear and warm. Two
      different
      [air masses](/reference/knowledge/wx-airmasses-and-fronts), less
      than forty miles apart, and the Coast Range divides them. The
      decision in front of the pilot is whether the coastal layer
      will burn off in time, and what the divert is if it does not.

      :::scenario slug="marine-stratus-pacific-nw"
      :::

      The four sub-pages walk: the intro and the inversion, a
      chart-by-chart read of the briefing pack, a Socratic analysis
      of the marine-layer geometry, and the instructor view into how
      the TruthModel encodes the coastal inversion.
    steps:
      - code: s11.5.1
        ordinal: 1
        title: Intro - the marine layer
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          You are at KSCK in the Central Valley, planning a short
          flight west to KSFO. The view at your departure airport is
          clear sky, 18 C, 4 C dewpoint, calm wind. KSFO is fifty
          miles away. KSFO's
          [METAR](/reference/knowledge/wx-reading-metars) reads
          OVC008, visibility 3 SM, temperature 12 C, dewpoint 11 C,
          wind 270 at 12. Both airports are inside the same weak
          synoptic envelope; the Coast Range between them is the
          difference. The marine
          [air](/reference/knowledge/wx-airmasses-and-fronts) west of
          the range is trapped under a subsidence inversion; the
          inland air east of the range is subsiding from above the
          inversion and stays clear.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/surface-analysis"
          :::

          The teaser to carry into the next sub-page: KSFO's
          temperature / dewpoint spread is 1 C. The KSCK spread is
          14 C. They are forty miles apart. Why?
      - code: s11.5.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-product-gfa
        body_md: |
          The marine-stratus
          [briefing](/reference/knowledge/wx-briefing-execution) leans
          on the GFA, the
          [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva),
          and the per-station
          [METARs](/reference/knowledge/wx-reading-metars) to
          expose the
          [air-mass](/reference/knowledge/wx-airmasses-and-fronts)
          contrast.

          ### Surface analysis (`surface-analysis`)

          The Pacific high (1024 mb) anchors the subsidence offshore;
          the Great Basin thermal low (1014 mb) drives the onshore
          gradient that keeps the marine air pushed against the
          Coast Range.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/surface-analysis"
          :::

          ### Graphical Forecast for Aviation (`gfa`)

          The GFA shows the IFR polygon hugging the coast: KMRY,
          KSFO, KOAK in IFR; KSCK / KSAC in VFR. The polygon's
          eastern boundary is the Coast Range crest.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/gfa"
          :::

          ### AIRMET / SIGMET overlay (`airmet-sigmet`)

          Two polygons:
          [Sierra](/reference/knowledge/wx-product-airmets)
          for the IFR pocket under the marine
          [stratus](/reference/knowledge/wx-clouds-and-precipitation)
          deck (0-1500 ft MSL), and a Sierra for mountain obscuration
          along the Coast Range (0-4000 ft MSL).

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/airmet-sigmet"
          :::

          ### METAR plot (`metar-plot`)

          The contrast is the chart. KMRY / KSFO / KOAK report mP
          marine signatures: T12 / Td11, OVC008, 270/12. KSCK / KSAC
          report mT inland: T18 / Td4, clear, light wind.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/metar-plot"
          :::

          ### Freezing level (`freezing-level`)

          High [freezing level](/reference/knowledge/wx-freezing-level)
          (summer at this latitude). No
          [icing](/reference/knowledge/wx-icing-types-and-avoidance)
          AIRMET. The marine-stratus hazard is ceiling and
          [visibility](/reference/knowledge/wx-fog-and-visibility-obstructions),
          not ice.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/freezing-level"
          :::

          ### PIREP plot (`pirep-plot`)

          A coastal [pilot report](/reference/knowledge/wx-product-pireps)
          confirms OVC008 and 3 SM in light drizzle. Three-product
          agreement: GFA, Sierra polygon, PIREP.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/pirep-plot"
          :::
      - code: s11.5.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          ### Why two different air masses forty miles apart

          The Pacific high drives marine
          [air](/reference/knowledge/wx-airmasses-and-fronts) onshore
          from the northwest; the air is in contact with the cool
          ocean and saturates at the surface. Above ~1500 ft MSL,
          descending air from the subtropical high warms
          adiabatically and dries (the subsidence inversion). The
          Coast Range is high enough to physically block the marine
          layer from spilling east; on the lee side the air is the
          subsiding mass from above the inversion, warm and dry. The
          mass boundary is a topographic one, not a frontal one.

          ### The temperature / dewpoint spread

          KSFO: T12 / Td11, spread 1 C. The marine air is saturated;
          the cloud deck is the saturation surface. KSCK: T18 / Td4,
          spread 14 C. The inland air has dried out from subsidence.
          The spread is the most direct readout of the inversion's
          effect.

          ### Why "wait an hour" might or might not work

          Marine
          [stratus](/reference/knowledge/wx-clouds-and-precipitation)
          burns off as solar heating warms the boundary layer above
          the dewpoint. The lifecycle is set by inversion strength +
          cloud-top height + sun angle. Thin marine layers (top at
          1000 ft AGL) burn off by mid-morning; deeper layers (top at
          2000 ft AGL) may persist past noon or fail to burn off at
          all on a foggy summer day. The 800-ft AGL ceiling and
          1500-ft AGL top in this scenario is a marginal case; the
          [TAF](/reference/knowledge/wx-reading-tafs) FM groups
          are the forecaster's call on the burn-off timing.

          ### AIRMET Sierra: ceiling vs visibility

          The [Sierra](/reference/knowledge/wx-product-airmets)
          polygon covers ceiling below 1000 ft AGL or visibility
          below 3 SM. In this scenario both fail: ceiling is 800 ft
          AGL, visibility is 3 SM in drizzle. The polygon shape
          follows the marine corridor; the eastern boundary is the
          Coast Range ridgeline.

          ### Mountain obscuration along the Coast Range

          A second Sierra covers the Coast Range itself: marine
          stratus tops at 1500 ft MSL abut the ridgeline at ~2500 ft
          MSL. The cloud does not crest the ridge, but it covers the
          windward slopes; VFR cannot navigate the ridgeline.

          ### Coastal PIREP corroboration

          A [pilot report](/reference/knowledge/wx-product-pireps)
          from inside the Sierra polygon confirms OVC008 and 3 SM in
          drizzle. Convergent evidence: synoptic truth (Pacific high,
          Great Basin low, Coast Range terrain), AIRMET Sierra
          polygon, [GFA](/reference/knowledge/wx-product-gfa) polygon,
          PIREP.

          :::chart slug="wx-scenarios/marine-stratus-pacific-nw/metar-plot"
          :::
      - code: s11.5.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          ### Source

          `libs/wx-engine/src/truth/scenarios/marine-stratus-pacific-nw.ts`.
          Two air-mass polygons (the marine mP coastal mass and the
          inland mT subsiding mass) with a boundary that follows the
          Coast Range crest. The mountain obscuration hazard is
          authored as a thin polygon along the ridgeline.

          ### Three tunable parameters

          - `airMasses[AM-postfrontal-marine-cP].meanCloudTopFtAgl:
            1500`. Cloud top sets the burn-off difficulty. Drop it
            to 1000 and the layer is forecast to dissipate by mid-
            morning; raise it to 2500 and the layer persists all
            day.
          - `synoptic.pressureSystems[H-pacific].centralPressureMb:
            1024`. The Pacific high strength controls how forcefully
            the marine air is pushed onshore. A weaker high (1018)
            lets the marine layer thin; a stronger high (1030)
            pushes it deeper inland.
          - `hazardZones[HZ-coastal-sierra-ifr].polygon`. The Sierra
            polygon's eastern boundary follows the Coast Range
            ridgeline. Move the polygon east and you encode a
            scenario where the marine layer spills through a gap.

          ### What produced each callout

          The Sierra callouts come from the same rule that produced
          the post-frontal-IFR callout in s11.1; the rule walks
          every IFR hazard zone regardless of mechanism. The
          mountain-obscuration callout uses a separate rule keyed
          off the `mountain-obscuration` hazard kind.

          ### Authored vs derived

          The Coast Range terrain is implicit (the polygon boundary
          follows it but the ridge geometry is not a first-class
          terrain object as in s11.4). Everything downstream is
          derived from the air-mass polygons:
          [METARs](/reference/knowledge/wx-reading-metars) report
          the mass each station sits in,
          [AIRMETs](/reference/knowledge/wx-product-airmets)
          trace from the hazard polygons,
          [GFA](/reference/knowledge/wx-product-gfa) polygons
          aggregate the hazard kinds,
          [PIREPs](/reference/knowledge/wx-product-pireps) are placed
          inside the Sierra polygon.

          ### Next iteration

          Add Coast Range terrain as a first-class object so the
          marine layer's eastern boundary derives from ridge crest +
          marine-layer top height. That unlocks scenarios where the
          marine layer spills inland through Coast Range gaps
          (Salinas Valley, San Francisco Bay) without re-authoring
          the polygon shape.

  - code: s11.6
    ordinal: 6
    level: lesson
    title: Radiation fog - California Central Valley
    body_md: |
      A February pre-dawn morning over the California Central Valley.
      A 1020-mb ridge sits overhead; calm wind; clear overnight skies
      collapsed the surface inversion. The saturated boundary layer
      [fog](/reference/knowledge/wx-fog-and-visibility-obstructions)
      floods the valley floor with visibility under half a mile at
      KFAT, KSCK, KMOD, and KMER. KPRB sits west
      of the Coast Range and stays clear. The forecast lifecycle is
      set by the diurnal cycle: the LIFR layer burns off in the four
      hours after solar noon (20Z) as surface heating lifts the
      mixing height through the inversion. The decision in front of
      the pilot is whether to delay until the burn-off, file IFR, or
      scrub the flight entirely.

      :::scenario slug="dense-fog-radiation-central-valley"
      :::

      The four sub-pages walk: the intro and the nocturnal inversion,
      a chart-by-chart read of the briefing pack, a Socratic analysis
      of the radiation-fog lifecycle, and the instructor view into
      how the TruthModel encodes the diurnal cycle.
    steps:
      - code: s11.6.1
        ordinal: 1
        title: Intro - the valley floor
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          You are at KFAT at 06:00 local on a February morning,
          watching the runway lights disappear into fog. The
          [METAR](/reference/knowledge/wx-reading-metars) reads
          002VV (vertical visibility 200 ft), visibility 1/4 SM in
          fog, T 4 C, Td 4 C, wind calm. The
          [surface analysis](/reference/knowledge/wx-product-surface-analysis-and-cva)
          shows a benign 1020-mb ridge overhead; the synoptic charts
          are uninteresting. The fog is local to the valley floor;
          KPRB an hour west reports clear and 10 SM. The valley fog
          is a boundary-layer phenomenon: the saturated air under the
          nocturnal inversion has collapsed to visibility under half
          a mile. The flight is grounded until the inversion breaks.
          The question is: when, and what is the forecast confidence?

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/surface-analysis"
          :::

          The teaser to carry into the next sub-page: solar noon is
          at 20Z. The [TAF](/reference/knowledge/wx-reading-tafs)
          FM groups predict burn-off after that. Why is the
          forecaster confident in a specific clock time and not just
          "later today?"
      - code: s11.6.2
        ordinal: 2
        title: Reading the charts
        knowledge_node_id: wx-product-gfa
        body_md: |
          Radiation fog
          [briefings](/reference/knowledge/wx-briefing-execution) lean
          on the [METAR](/reference/knowledge/wx-reading-metars)
          plot, the GFA, and the TAF FM groups. Synoptic charts look
          quiet.

          ### Surface analysis (`surface-analysis`)

          The 1020-mb ridge overhead and the departing 1014-mb low
          to the east. Calm winds. No
          [fronts](/reference/knowledge/wx-airmasses-and-fronts). The
          synoptic chart is background; the fog is a boundary-layer
          feature.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/surface-analysis"
          :::

          ### Graphical Forecast for Aviation (`gfa`)

          The LIFR polygon covers the valley floor (KFAT, KSCK,
          KMOD, KMER). KPRB west of the Coast Range is VFR. The
          polygon shape is the valley basin.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/gfa"
          :::

          ### AIRMET / SIGMET overlay (`airmet-sigmet`)

          Two polygons:
          [Sierra](/reference/knowledge/wx-product-airmets)
          for the valley-floor LIFR layer (0-300 ft MSL), and a
          Sierra for Coast Range mountain obscuration (0-4000 ft
          MSL) where the fog tops abut the ridgeline.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/airmet-sigmet"
          :::

          ### METAR plot (`metar-plot`)

          Every valley station reports temperature equal to dewpoint
          (saturation). KPRB outside the basin reports T 8 / Td -1,
          a 9 C spread. The basin / non-basin split is the chart.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/metar-plot"
          :::

          ### TAF (one per valley station)

          The FM groups in each TAF mark the forecast burn-off time.
          The pre-dawn period reads 1/4 SM FG; the post-noon period
          reads SCT020.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/taf-kfat"
          :::

          ### PIREP plot (`pirep-plot`)

          A valley [PIREP](/reference/knowledge/wx-product-pireps)
          from the previous evening confirms the inversion (smooth
          air, visibility falling). The current PIREPs are sparse:
          no one is flying.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/pirep-plot"
          :::
      - code: s11.6.3
        ordinal: 3
        title: Analysis - discovery prompts
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          ### Why temperature equals dewpoint

          Calm wind plus clear overnight skies lets the surface
          radiate heat away unobstructed; the surface air cools to
          its dewpoint and saturation occurs at ground level. The
          valley floor is a basin: the cold dense air pools (cold
          air sinks) and the layer deepens until the inversion top
          caps it. Every valley station reports T equal to Td
          because every valley station is inside the same saturated
          pool.

          ### Why KPRB stays clear

          KPRB sits at higher elevation west of the Coast Range,
          above the inversion top. Above the inversion the air is
          subsiding warm and dry under the 1020-mb ridge. KPRB sees
          the ridge synoptic; the valley stations see the
          boundary-layer collapse. The same synoptic state produces
          two completely different surface observations because the
          terrain divides the basin from the ridge.

          ### The diurnal-cycle forecast

          The burn-off mechanism is solar heating of the surface.
          Around solar noon (20Z in this scenario) the sun lifts the
          mixing height; once the mixing height exceeds the
          inversion top, the saturated layer entrains drier air from
          above and the fog dissipates. The four-hour lag between
          solar noon and forecast burn-off is the time it takes for
          the mixing height to climb through the inversion top.
          This is why the
          [TAF](/reference/knowledge/wx-reading-tafs) FM
          groups carry specific clock times: the diurnal cycle is the
          most reliable input to a boundary-layer fog forecast.

          ### LIFR vs IFR vs MVFR

          The [AIRMET](/reference/knowledge/wx-product-airmets)
          Sierra polygon covers ceiling below 1000 ft AGL or
          visibility below 3 SM. Inside the polygon both fail
          (visibility 1/4 SM, ceiling 002VV). LIFR specifically means
          visibility below 1 SM and / or ceiling below 500 ft AGL.
          The polygon is LIFR; the Sierra family is the AIRMET
          mechanism that wraps it.

          ### Mountain obscuration

          The Sierra mountain-obscuration polygon along the Coast
          Range covers the upwind ridge faces where fog tops abut
          the ridge line. The fog does not crest the ridge (the
          inversion caps it), but it obscures the windward slopes.
          Same mechanism as the marine-stratus mountain
          obscuration in s11.5, different basin.

          ### Forecast confidence and the wait

          A delay until 24Z is a defensible plan: the diurnal cycle
          is the highest-confidence forecast input we have. The
          trap: a high-pressure system that lingers means a second
          night of clear skies and a second morning of fog tomorrow.
          The wait is for today's burn-off, not for the synoptic
          state to change. If the synoptic state is stable and the
          forecast is for clear overnight conditions again, expect
          the same scenario at the same time tomorrow.

          :::chart slug="wx-scenarios/dense-fog-radiation-central-valley/metar-plot"
          :::
      - code: s11.6.4
        ordinal: 4
        title: Instructor internals
        knowledge_node_id: wx-fog-and-visibility-obstructions
        body_md: |
          ### Source

          `libs/wx-engine/src/truth/scenarios/dense-fog-radiation-central-valley.ts`.
          Two air-mass polygons (the valley-floor cP inversion mass
          and the departing mT mass east of the Coast Range) plus
          the diurnal block that drives the lifecycle: solar noon
          at 20Z, mixing height at 200 ft MSL, nocturnal inversion
          true.

          ### Three tunable parameters

          - `diurnal.mixingHeightFtMsl: 200`. The pre-burn-off
            mixing height defines the trapped-layer depth. Raise
            it to 1000 and the fog never forms; drop it to 100 and
            the layer is shallower but more concentrated.
          - `diurnal.nocturnalInversion: true`. The flag that
            activates the radiation-fog rule set. Flip it to false
            and the scenario becomes a different scenario (a
            standard clear-and-cool valley morning).
          - `airMasses[AM-valley-inversion-cP].surfaceTempC: 4` and
            `surfaceDewpointC: 4`. The saturation condition. Spread
            them apart by 2 C and the saturation fails; the fog
            polygon disappears.

          ### What produced each callout

          The Sierra valley-floor callouts come from the same IFR
          hazard-zone rule used across scenarios. The mountain
          obscuration callout uses the same rule as s11.4 / s11.5
          against a different basin. The diurnal-cycle callouts
          come from a rule that walks `diurnal.solarNoonUtcHour` +
          `diurnal.mixingHeightFtMsl` and emits the burn-off
          forecast prompt.

          ### Authored vs derived

          The valley basin and the Coast Range crest are implicit
          in the polygon shapes. The diurnal cycle is authored
          (a TruthModel literal) but its consequences are derived:
          the [TAF](/reference/knowledge/wx-reading-tafs) FM
          groups, the
          [Sierra](/reference/knowledge/wx-product-airmets)
          polygon altitude bounds, the mountain-obscuration top all
          trace from the diurnal block + the
          [air-mass](/reference/knowledge/wx-airmasses-and-fronts)
          parameters.

          ### Next iteration

          Add a time-advance operator that steps the diurnal cycle
          forward in 30-minute increments. Once that lands, the
          scenario yields a full-morning replay: dense fog at 06Z,
          mixing-height rise starting at 18Z, burn-off complete by
          24Z. Each step re-derives every product and re-issues the
          [AIRMET](/reference/knowledge/wx-product-airmets)
          polygons.
