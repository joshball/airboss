code: s9
ordinal: 9
title: In-flight weather
body_md: |
  **Before you start.** This section assumes the pre-flight picture
  is in hand: the synoptic story (s2 through s6), the
  [airport text products](/reference/knowledge/wx-reading-metars)
  from s7, and the
  [regional products](/reference/knowledge/wx-product-gfa) from s8.
  It teaches what changes when those same products start updating
  in the cockpit instead of on the ground.

  Terms you will see referenced but not fully taught here:

  - [ADS-B FIS-B](/reference/knowledge/wx-flight-deck-weather-displays)
    and [XM weather](/reference/knowledge/wx-flight-deck-weather-displays):
    the two main data services. Introduced in s9.1 below.
  - [NEXRAD](/reference/knowledge/wx-equipment-and-data-limitations)
    composite reflectivity: the cockpit radar mosaic and its latency
    trap. Taught in s9.2.
  - [EFB](/reference/knowledge/wx-flight-deck-weather-displays)
    (electronic flight bag): the moving-map overlay layer. Not a
    weather product itself; treat it as a viewer for the products
    you already know.

  In-flight weather tightens your decision interval; it does not
  expand your decision authority.

  ---

  The briefing ended at the run-up. From taxi onward you're flying
  with whatever weather picture you can build in real time -- and the
  The [briefing](/reference/knowledge/wx-briefing-execution) ended at
  the run-up. From taxi onward you're flying with whatever weather
  picture you can build in real time -- and the picture is necessarily
  incomplete.

  Modern cockpits have made this picture richer than any prior
  generation of GA flying:
  [ADS-B FIS-B](/reference/knowledge/wx-data-sources) brings
  [METARs](/reference/knowledge/wx-reading-metars)
  ([reference](/reference/wx/products/metar)),
  [TAFs](/reference/knowledge/wx-reading-tafs)
  ([reference](/reference/wx/products/taf)), NEXRAD,
  [AIRMETs](/reference/knowledge/wx-product-airmets)
  ([reference](/reference/wx/products/airmet)),
  [SIGMETs](/reference/knowledge/wx-product-sigmets)
  ([reference](/reference/wx/products/sigmet)),
  and [PIREPs](/reference/knowledge/wx-product-pireps)
  ([reference](/reference/wx/products/pirep)) into the flight
  deck. XM weather adds graphical lightning and high-resolution radar.
  EFBs overlay all of it on the moving map. The risk is treating the
  cockpit display as ground truth; latency, gaps, and resolution all
  change what the display means.

  This section is about flying the picture without trusting it more
  than it deserves.
steps:

  - code: s9.1
    ordinal: 1
    title: Flight deck weather displays
    body_md: |
      What's on the display, where does it come from, and how often
      does it update? Different sources have different refresh
      cadences, different resolutions, and different latencies between
      observation and display.

      The pilot habit: every weather display should be paired with the
      mental question "how old is this image?" If you can't answer it
      from the display itself, you don't know what you're looking at.
    knowledge_node_id: wx-flight-deck-weather-displays

  - code: s9.2
    ordinal: 2
    title: Weather equipment and data limitations
    body_md: |
      NEXRAD via FIS-B can be five to fifteen minutes old. A
      [thunderstorm](/reference/knowledge/wx-thunderstorm-hazards) cell
      that wasn't on the screen at briefing might already be where
      you're flying. Composite reflectivity averages the entire
      vertical column -- a green echo can hide a yellow cell at
      altitude. [PIREPs](/reference/knowledge/wx-product-pireps) are
      voluntary and sparse. Ceiling and
      [visibility](/reference/knowledge/wx-fog-and-visibility-obstructions)
      reports are point observations, not area conditions.

      Every limitation translates to a single rule: in-flight weather
      tightens your decision interval, it does not expand your
      decision authority. If the picture you're getting in the air
      tells you "this is not the weather you briefed," the next
      action is a course correction, not a continuation.
    knowledge_node_id: wx-equipment-and-data-limitations
