<!doctype html>
<html lang="en" data-app-id="study" data-theme="study/sectional" data-appearance="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<title>airboss study</title>
		<script>
			/*
			 * Pre-hydration theme resolution.
			 *
			 * Sets data-theme + data-appearance on <html> before the first
			 * paint, so tokens resolve from the correct block immediately
			 * and SvelteKit's hydration doesn't cause a theme flash. Mirrors
			 * the core of @ab/themes/resolveThemeForPath -- keep the two
			 * in sync when flightdeck paths grow.
			 */
			(function () {
				try {
					var path = window.location.pathname;
					var theme = path === '/dashboard' || path.indexOf('/dashboard/') === 0
						? 'study/flightdeck'
						: 'study/sectional';
					var cookieMatch = document.cookie.match(/appearance=(light|dark)/);
					var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					var appearance = cookieMatch ? cookieMatch[1] : system;
					var html = document.documentElement;
					html.setAttribute('data-theme', theme);
					html.setAttribute('data-appearance', appearance);
				} catch (e) {
					// CSS defaults cover fallback (:root block carries the
					// sectional light palette).
				}
			})();
		</script>
		%sveltekit.head%
		<style>
			/*
			 * Base document styles. All colors / fonts / sizes resolve from
			 * the token layer emitted into @ab/themes/generated/tokens.css.
			 * The :root block there carries the sectional light palette so
			 * the body paints correctly before hydration; [data-theme][data-appearance]
			 * selectors override on the subtree matching the active surface.
			 */
			html {
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				text-rendering: optimizeLegibility;
			}

			body {
				margin: 0;
				font-family: var(--font-family-base);
				font-size: var(--font-size-base);
				line-height: var(--line-height-normal);
				min-height: 100vh;
				background: var(--surface-page);
				color: var(--ink-body);
			}

			h1, h2, h3, h4 {
				line-height: var(--line-height-tight);
			}

			:focus-visible {
				outline: 2px solid var(--focus-ring-strong);
				outline-offset: 2px;
			}
		</style>
	</head>
	<body>
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
