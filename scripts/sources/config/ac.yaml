# Advisory Circulars (AC) URL inventory.
#
# Single source of truth for the per-AC download list. The TS loader at
# `scripts/sources/config/loader.ts` reads this file at runtime; the
# downloader emits one DownloadPlan per entry.
#
# When the FAA rotates an AC URL or releases a new revision, edit this file
# (no code change required) and re-run `bun run sources verify-urls`.
#
# Schema:
#   base_url:  prefix common to every entry's URL (informational only;
#              entries carry their full URL explicitly so a one-off oddly-
#              named filename doesn't have to encode the prefix).
#   entries:   list of `{ doc_id, edition, url, filename }`.
#     doc_id:  lowercase kebab-case `ac-<number>[-<revision>]`.
#     edition: revision letter (string), or null when the AC has no revision.
#     url:     canonical absolute https URL.
#     filename: publisher-side filename (used for cache filename + manifest).

base_url: https://www.faa.gov/documentLibrary/media/Advisory_Circular

entries:
  - doc_id: ac-00-6-b
    edition: B
    url: https://www.faa.gov/documentLibrary/media/Advisory_Circular/AC_00-6B.pdf
    filename: AC_00-6B.pdf
