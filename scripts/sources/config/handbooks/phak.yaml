# Pilot's Handbook of Aeronautical Knowledge (PHAK)
#
# Source: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/faa-h-8083-25c.pdf
# Edition: FAA-H-8083-25C (2024)

document_slug: phak
edition: FAA-H-8083-25C
kind: handbook
title: "Pilot's Handbook of Aeronautical Knowledge"
publisher: FAA
# Library-index aviation-topic subjects (1..3). Closed vocabulary --
# values must be valid `AviationTopic` members. Drives subject grouping
# at /library.
subjects: [aerodynamics, aircraft-systems, weather]
# Library-by-cert placement. Forwarded to `study.reference.primary_cert`
# by the seeder; null = cert-agnostic. Closed vocabulary -- value must
# be one of CERT_APPLICABILITY_VALUES.
primary_cert: private

# -----------------------------------------------------------------------------
# Source download (TS downloader)
# -----------------------------------------------------------------------------

# Whole-doc PDF (kept alongside chapter PDFs for cross-chapter reference).
whole_doc:
  url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/faa-h-8083-25c.pdf
  filename: FAA-H-8083-25C.pdf

# Per-chapter PDFs. PHAK is Class A1 (chapter PDFs available, NO separately-
# distributed ancillaries -- the whole-doc bundles front matter, glossary,
# and index). Verified empirically 2026-04-29.
#
# Two-hop scrape: the FAA's PHAK index page lists per-chapter HTML pages
# (chapter-1-introduction-flying, chapter-7-aircraft-systems, etc.); each
# chapter page contains exactly one .pdf link. The scraper finds chapter
# pages by ordinal-prefix match (`chapter-{N}-`) ignoring slug content; PHAK
# uses inconsistent kebab slugs so prefix-match is more resilient than a
# slug list.
chapter_pdfs:
  index_url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/phak
  chapter_page_pattern: chapter-{N}-
  chapter_count: 17
  ancillary: []   # PHAK does not publish front/toc/glossary/index as separate PDFs

# URL-substring patterns the downloader skips even if the publisher serves
# them. Default empty; documented for future use.
excluded_assets: []

# Legacy field used by the Python ingest tool when whole_doc is absent.
# Kept here for backward-compatibility with code that hasn't migrated.
source_url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/faa-h-8083-25c.pdf
# `expected_pages` is informational; set after the first ingest run records
# the actual PDF page count.
expected_pages: 522
# Number of pre-numbered pages to skip when mapping PDF page -> FAA-printed
# page number. PHAK ships a ~20-page Roman-numeral preface; tune after the
# first run if the printed page numbers in the manifest are off.
page_offset: 0
# PHAK 25C ships per-chapter PDFs concatenated together; the bookmark tree
# lists the file names ("03_phak_ch1.pdf") rather than the chapter titles, so
# we infer chapter boundaries from page text (the FAA-style `<chapter>-<page>`
# header on every page) instead of trusting `get_toc()`.
outline_strategy: content
# Hand-curated outline overrides for sections the content scan mis-detects.
# Each entry is { code, level, parent_code, title, page_start, page_end }.
outline_overrides: []
# Per-chapter title corrections. The content scan extracts the title above
# each "Chapter N" sentinel; chapters whose typeset title spans more than
# the heuristic window (or whose layout buries the title in body text) get
# the right name applied here.
title_overrides:
  "5": "Aerodynamics of Flight"
  "8": "Flight Instruments"
# Default patterns are inherited from the loader; override per-handbook only
# when the FAA changes its captioning convention.
figure_prefix_pattern: 'Figure (\d+)-(\d+)\.'
table_prefix_pattern: 'Table (\d+)-(\d+)\.'

# -----------------------------------------------------------------------------
# Section-tree extraction (toc = deterministic Python; prompt = paste-and-run
# Claude Code flow; compare = read the prompt-flow JSONs and diff vs TOC).
# See docs/agents/section-extraction-prompt-strategy.md for the prompt flow.
# -----------------------------------------------------------------------------

# Default section-tree strategy. `toc` = deterministic Python parser of the
# printed Table of Contents (sections_via_toc.py). `prompt` = emit a prompt
# set under tools/handbook-ingest/prompts-out/ that the user pastes into a
# fresh Claude Code session (no API key). `compare` = run TOC and diff
# against the per-chapter JSON files produced by the prompt flow.
section_strategy: toc

# Printed Table of Contents page range (PDF page numbers, not the printed
# Roman numerals). Determined empirically by inspecting the source PDF;
# locked here so the parser is reproducible.
toc:
  page_start: 6           # PDF page that starts the TOC (printed page vii)
  page_end: 15            # PDF page that ends the TOC (printed page xvi)
  pattern: dotted_leader  # for future handbooks with different TOC styles

# Heading-style fingerprint used by sections_via_toc to verify TOC entries
# against the body PDF. PHAK heading runs are bold red Helvetica at ~12pt;
# tune body_font_size + heading_min_size_ratio if a future edition restyles.
heading_style:
  body_font_size: 10.5
  heading_min_size_ratio: 1.05  # heading is at least 1.05x body size
  heading_color_hex: '#ef4144'  # FAA red for PHAK 25C
  heading_match_threshold: 0.85
  verify_in_body: true

# Prompt-strategy tuning. Per-chapter input cap for the plaintext sidecar
# the sub-agent reads. Sized to fit the longest chapter with 20% headroom
# (rounded up to next 25K). PHAK FAA-H-8083-25C longest is ch05
# Aerodynamics of Flight at 191,637 chars; cap is 250,000. Driven by the
# section-extraction-contract-v2 truncation fix (Phase 1) -- the prior
# 60K cap silently truncated 11 of 17 chapters mid-content. Re-measure
# with tools/handbook-ingest/measure_chapter_sizes.py if a future
# edition restyles.
prompt:
  chapter_text_max_chars: 250000

# Strip the chapter cover-page boilerplate from the chapter markdown body.
# When enabled, normalize.py strips leading "Chapter N" / chapter-title /
# "Introduction" lines until the first body paragraph (length > 80 OR
# starts with a lowercase character).
chapter_cover_strip:
  enabled: true
  max_lines: 6

# How many PDF pages to walk backward from a target page when reading the
# printed FAA page label. Five pages clears chapter-summary pages that omit
# the FAA header, multi-page figure spreads, and the trailing glossary stub
# that ends a handbook. Set to 0 to disable the walk-back (legacy behavior).
page_label_walk_back: 5

# Per-chapter explicit field overrides. Used when the parser cannot recover
# a value from the PDF -- e.g. a chapter-summary page that lacks any
# parseable FAA header within the walk-back window. Today only
# `faa_page_start` / `faa_page_end` are honored. The PHAK chapter 17 case
# is now resolved by the content-scan outline detector capping the last
# chapter at the last page bearing its FAA header, so no override is
# currently needed for PHAK 25C. Example shape:
#
#   chapter_overrides:
#     17:
#       faa_page_end: "17-100"
chapter_overrides: {}

# Front-matter PDF page range (1-indexed, inclusive). Pages 1..15 cover the
# title page, copyright/notice, preface, acknowledgments, and the printed
# Table of Contents; chapter 1 ("Introduction to Flying") begins at PDF
# page 16 (printed FAA page 1-1). Per WP-HANDBOOK-RE-EXTRACTION-V2 sub-
# phase 1D. Empirically verified by walking the cached PDF for the first
# body page bearing the FAA `<chap>-<page>` header.
front_matter_page_range: [1, 15]

# Declarative errata list. Each entry is one FAA-published amendment to
# this edition, applied via `bun run sources extract handbooks phak
# --apply-errata <id>`. See ADR 020 for the cumulative-vs-incremental
# policy and `docs/work-packages/apply-errata-and-afh-mosaic/` for the
# parser layout taxonomy.
#
# PHAK MOSAIC uses a different structural form than AFH MOSAIC: comma-
# delimited chapter anchors ("Chapter 1, Introduction to Flying, X
# section, ...") and bullet-level edits ("in the first set of bullets
# on page Y-Z, the bullet that states ..."), plus list reorderings,
# title-and-paragraph composites, and a single removal directive. All
# these forms map onto the existing three patch kinds; the
# `bullet-edits` parser archetype handles the layout (see
# `tools/handbook-ingest/ingest/errata_parsers/bullet_edits.py`).
errata:
  - id: mosaic
    source_url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/PHAK_Addendum_(MOSAIC).pdf
    published_at: '2025-10-20'
    parser: bullet-edits

# Discovery dismissal stop-list. Each entry silences a candidate that
# `bun run sources discover-errata` would otherwise re-flag every week.
# Schema: at least one of `url` or `sha256`; optional `reason` is a
# free-form audit note. Dismissal is honored across re-runs; the
# discovery dispatcher will not re-open a GitHub issue for the URL.
dismissed_errata: []

