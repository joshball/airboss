# Airplane Flying Handbook (AFH)
#
# Source: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/00_afh_full.pdf
# Edition: FAA-H-8083-3C (2021; current bound edition as of 2026-04)
#
# Errata: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/AFH_Addendum_(MOSAIC).pdf
#   (October 2025 MOSAIC addendum -- not applied here per ADR 020;
#   tracked for the future `--apply-errata` flow.)

document_slug: afh
edition: FAA-H-8083-3C
kind: handbook
title: "Airplane Flying Handbook"
publisher: FAA
subjects: [procedures, aerodynamics, training-ops]

# -----------------------------------------------------------------------------
# Source download (TS downloader)
# -----------------------------------------------------------------------------

# Whole-doc PDF (kept alongside chapter PDFs for cross-chapter reference).
whole_doc:
  url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/00_afh_full.pdf
  filename: FAA-H-8083-3C.pdf

# Per-chapter PDFs. AFH is Class A2 (chapter PDFs + separately-distributed
# ancillaries: front matter, glossary, index). Direct URL pattern -- the
# publisher's airplane_handbook/ index links chapter PDFs directly.
#
# AFH file-ordinal sequence: front=01, ch1=02, ch2=03, ..., chN = N+1, then
# glossary=20, index=21. The {N} placeholder is the chapter ordinal (1..18);
# {NN} is the zero-padded file ordinal (chapter ordinal + file_ordinal_offset).
chapter_pdfs:
  direct_pattern: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/{NN}_afh_ch{N}.pdf
  chapter_count: 18
  file_ordinal_offset: 1
  ancillary:
    - kind: front
      url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/01_afh_front.pdf
    - kind: glossary
      url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/20_afh_glossary.pdf
    - kind: index
      url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/21_afh_index.pdf

# URL-substring patterns the downloader skips even if the publisher serves
# them. Default empty; documented for future use.
excluded_assets: []

# Legacy field used by the Python ingest tool when whole_doc is absent.
source_url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/airplane_handbook/00_afh_full.pdf
expected_pages: 406
# AFH chapter cover pages typeset the inline `Chapter N: Title` heading on
# the same page that carries the FAA `<chap>-<page>` footer (e.g. p22 has
# both "Chapter 1: Introduction to Flight Training" and the footer "1-1").
# Front matter occupies pp.1-21; pp.22+ carry FAA pagination.
page_offset: 0
# AFH bookmarks are file-name-flavored ("02 - AFH Chapter 1 (Draft 4)") and
# don't carry chapter titles, so we use the content scanner to derive the
# chapter tree from the FAA-style page headers in each page footer.
outline_strategy: content
outline_overrides: []
# `_extract_chapter_title` recognizes the AFH inline form ("Chapter N:
# Title") so most chapters resolve automatically. Title overrides are only
# needed when the cover page lays out the title in some other shape.
title_overrides: {}
figure_prefix_pattern: 'Figure (\d+)-(\d+)\.'
table_prefix_pattern: 'Table (\d+)-(\d+)\.'

# -----------------------------------------------------------------------------
# Section-tree extraction
# -----------------------------------------------------------------------------

# `toc` = deterministic Python parser; `prompt` = paste-and-run Claude Code
# flow; `compare` = diff the prompt JSONs against TOC. See
# docs/agents/section-extraction-prompt-strategy.md.
section_strategy: toc

# Printed Table of Contents page range (PDF page numbers).
# Empirically: AFH 3C TOC spans PDF pp. 10-21 (12 pages).
toc:
  page_start: 10
  page_end: 21
  # AFH lays out TOC entries with the title in the left column and the page
  # anchor in a right-margin column on a slightly different y. PHAK's
  # dotted-leader form does not apply.
  pattern: right_column

# AFH chapter cover pages typeset the chapter heading in plain (not red)
# Arial-Bold; section headings inside a chapter are also Arial-Bold but
# match a different size class. Body verification stays off until the
# fingerprint is tuned per-chapter; the TOC parse is the source of truth
# in the meantime. (PHAK's red-Helvetica fingerprint does not apply.)
heading_style:
  body_font_size: 10.0
  heading_min_size_ratio: 1.10
  heading_color_hex: '#000000'
  heading_match_threshold: 0.85
  verify_in_body: false

# Per-chapter input cap for the plaintext sidecar the sub-agent reads.
# Sized to fit the longest chapter with 20% headroom (rounded up to next
# 25K). AFH FAA-H-8083-3C longest is ch18 Emergency Procedures at 165,187
# chars; cap is 200,000. Driven by the section-extraction-contract-v2
# truncation fix (Phase 1) -- the prior 60K cap truncated 7 of 18
# chapters. Re-measure with tools/handbook-ingest/measure_chapter_sizes.py
# if a future edition restyles.
prompt:
  chapter_text_max_chars: 200000

# AFH chapter cover pages render the chapter title once on the cover and
# then the content begins on the next page. The strip removes the
# inline "Chapter N: Title" / "Introduction" sentinel so the chapter
# overview body doesn't open with a stutter.
chapter_cover_strip:
  enabled: true
  max_lines: 6

page_label_walk_back: 5
chapter_overrides: {}

# Declarative errata list. Each entry is one FAA-published amendment to
# this edition, applied via `bun run sources extract handbooks afh
# --apply-errata <id>`. See ADR 020 for the cumulative-vs-incremental
# policy and `docs/work-packages/apply-errata-and-afh-mosaic/` for the
# parser layout taxonomy.
errata:
  - id: mosaic
    source_url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/AFH_Addendum_(MOSAIC).pdf
    published_at: '2025-10-20'
    parser: additive-paragraph

# Discovery dismissal stop-list. Each entry silences a candidate that
# `bun run sources discover-errata` would otherwise re-flag every week.
# Schema: at least one of `url` or `sha256`; optional `reason` is a
# free-form audit note. Dismissal is honored across re-runs; the
# discovery dispatcher will not re-open a GitHub issue for the URL.
#
# Example:
#   dismissed_errata:
#     - url: https://www.faa.gov/some/path/press-release.pdf
#       reason: "press release, not an errata"
dismissed_errata: []

