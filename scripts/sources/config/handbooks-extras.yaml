# Handbook extras (whole-doc only, no chapter splits available).
#
# Optional handbooks the downloader fetches when --include-handbooks-extras is set.
# These are all Class C handbooks (whole-doc only) per the chapter-source-ingestion
# spec; the publisher does not ship per-chapter PDFs for any of them.
#
# Class A handbooks (PHAK, AFH, IPH, helicopter, glider, balloon, instructors)
# live in `handbooks/<slug>.yaml` -- they get the full whole-doc + chapter-PDF
# treatment. AVWX (Class C with chapter-PDFs unavailable) lives in `handbooks/`
# alongside the others for symmetry.
#
# URLs verified 2026-04-29 by HEAD against faa.gov.
#
# REMOVED 2026-04-29 (URLs returned 404 against the canonical paths previously
# stored here; could not find current canonical PDFs via search):
#   - faa-h-8083-27 Sport Pilot Handbook
#   - faa-h-8083-30 AMT General Handbook
#   - faa-h-8083-32 AMT Powerplant Handbook
#   - faa-h-8083-34 Risk Management Handbook for GA Pilots
# When a current URL is identified, add the entry back here. The verifier
# (`bun run sources verify-urls`) catches stale URLs at HEAD time, so this
# YAML stays a deterministic source-of-truth.

base_url: https://www.faa.gov/sites/faa.gov/files

entries:
  - doc_id: faa-h-8083-2
    edition: '2A'
    url: https://www.faa.gov/sites/faa.gov/files/2022-06/risk_management_handbook_2A.pdf
    filename: risk_management_handbook_2A.pdf
  - doc_id: faa-h-8083-9
    edition: null
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/aviation_instructors_handbook/aviation_instructors_handbook.pdf
    filename: aviation_instructors_handbook.pdf
  - doc_id: faa-h-8083-15
    edition: '15B'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/FAA-H-8083-15B.pdf
    filename: FAA-H-8083-15B.pdf
  - doc_id: faa-h-8083-16
    edition: '16B'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/instrument_procedures_handbook/FAA-H-8083-16B.pdf
    filename: FAA-H-8083-16B.pdf
