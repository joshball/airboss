# Handbook extras -- single-doc residual corpus.
#
# Originally a multi-handbook corpus for whole-doc-only Class C handbooks.
# As of Wave 2 (2026-05-03), every FAA-H-* handbook has been promoted to the
# chapter-aware Class A2 pipeline at `scripts/sources/config/handbooks/<slug>.yaml`.
# Only Tips on Mountain Flying remains here because it's a unique case:
# scanned 1999 pamphlet with unusable OCR; uses a hand-curated `body_override`
# markdown that the chapter-aware pipeline doesn't support.
#
# Promoted out (no longer in this YAML; see `scripts/sources/config/handbooks/<slug>.yaml`):
#   - faa-h-8083-2 Risk Management Handbook (WP-RMH, 2026-05-03)
#   - faa-h-8083-9 Aviation Instructor's Handbook (WP-AIH, 2026-05-03)
#   - faa-h-8083-15 Instrument Flying Handbook (WP-IFH-SECTION-TREE, 2026-05-03)
#   - faa-h-8083-16 Instrument Procedures Handbook (WP-IPH-section-tree, 2026-05-03)
#
# Removed from corpus entirely (not pilot-training relevant):
#   - faa-h-8083-30 AMT-General (#505, 2026-05-03)
#   - faa-h-8083-32 AMT-Powerplant (#505, 2026-05-03)
#
# Confirmed never re-added (no current canonical FAA whole-doc PDF):
#   - faa-h-8083-27 Sport Pilot Handbook (publication retired)
#   - faa-h-8083-34 Risk Management Handbook for GA Pilots (superseded by 8083-2A)
#
# When mtn-tips's body_override mechanism gets ported to the chapter-aware
# pipeline (see WP-EXTRAS-RETIRE follow-up), this entire YAML + the
# `libs/sources/src/handbooks-extras/` module can be deleted.

base_url: https://www.faa.gov/sites/faa.gov/files

# Per-row metadata:
#   subjects:     1-3 entries from AVIATION_TOPIC_VALUES.
#   primary_cert: null (cert-agnostic) or one of CERT_APPLICABILITY_VALUES.

entries:
  # Non-FAA-H-numbered FAA pamphlet. 1999 scanned PDF; OCR is unusable.
  # Section-tree comes from parsing the hand-curated `body_override` markdown
  # at `scripts/sources/config/handbooks-extras-overrides/faa-mtn-tips.md`.
  - doc_id: faa-mtn-tips
    edition: '2003'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/tips_on_mountain_flying.pdf
    filename: tips_on_mountain_flying.pdf
    subjects: [performance, weather, emergencies]
    primary_cert: null
    body_override: scripts/sources/config/handbooks-extras-overrides/faa-mtn-tips.md
