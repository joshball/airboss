# Handbook extras (whole-doc only, no chapter splits available).
#
# Optional handbooks the downloader fetches when --include-handbooks-extras is set.
# These are all Class C handbooks (whole-doc only) per the chapter-source-ingestion
# spec; the publisher does not ship per-chapter PDFs for any of them.
#
# Class A handbooks (PHAK, AFH, IPH, helicopter, glider, balloon, instructors)
# live in `handbooks/<slug>.yaml` -- they get the full whole-doc + chapter-PDF
# treatment. AVWX (Class C with chapter-PDFs unavailable) lives in `handbooks/`
# alongside the others for symmetry.
#
# URLs verified 2026-04-29 by HEAD against faa.gov.
#
# Re-added 2026-04-29 after follow-up search, then deferred 2026-05-03
# (commented out below; maintenance-technician corpus, no pilot-training
# relevance):
#   - faa-h-8083-30 AMT General Handbook (30B at amtg_handbook.pdf)
#   - faa-h-8083-32 AMT Powerplant Handbook (32B at amt_powerplant_handbook.pdf)
#
# Confirmed dropped (no current canonical whole-doc PDF on the FAA
# Aviation Handbooks & Manuals index page):
#   - faa-h-8083-27 Sport Pilot Handbook (publication retired; not on
#     /regulations_policies/handbooks_manuals/aviation index)
#   - faa-h-8083-34 Risk Management Handbook for GA Pilots (retired and
#     superseded by FAA-H-8083-2A; not on the FAA aviation index)
# When current URLs surface, add the entries back here. The verifier
# (`bun run sources verify-urls`) catches stale URLs at HEAD time, so this
# YAML stays a deterministic source-of-truth.

base_url: https://www.faa.gov/sites/faa.gov/files

# Per-row metadata:
#   subjects:     1-3 entries from AVIATION_TOPIC_VALUES (libs/constants/src/reference-tags.ts).
#                 Required; the loader rejects rows without it.
#   primary_cert: null (cert-agnostic) or one of CERT_APPLICABILITY_VALUES. Required;
#                 the loader rejects rows where the field is missing entirely. Use
#                 explicit `null` for cert-agnostic handbooks.
#
# These values flow through `bun run sources register handbooks-extras` into every
# produced manifest.json so the post-WP-SUB seeder picks them up. Don't author the
# fields directly in the produced manifests -- they get overwritten on the next
# register run.

entries:
  - doc_id: faa-h-8083-2
    edition: '2A'
    url: https://www.faa.gov/sites/faa.gov/files/2022-06/risk_management_handbook_2A.pdf
    filename: risk_management_handbook_2A.pdf
    subjects: [human-factors]
    primary_cert: private
  - doc_id: faa-h-8083-9
    edition: null
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/aviation_instructors_handbook/aviation_instructors_handbook.pdf
    filename: aviation_instructors_handbook.pdf
    subjects: [training-ops, human-factors]
    primary_cert: cfi
  - doc_id: faa-h-8083-15
    edition: '15B'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/FAA-H-8083-15B.pdf
    filename: FAA-H-8083-15B.pdf
    subjects: [procedures, navigation, flight-instruments]
    primary_cert: instrument
  - doc_id: faa-h-8083-16
    edition: '16B'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/instrument_procedures_handbook/FAA-H-8083-16B.pdf
    filename: FAA-H-8083-16B.pdf
    subjects: [procedures, navigation, flight-instruments]
    primary_cert: instrument
  # AMT corpus deferred 2026-05-03: maintenance technician handbooks, no
  # pilot-training relevance. The PDF cache and any prior ingest output stay
  # in place; un-deferring is a one-line YAML uncomment plus a `bun run
  # sources download --include-handbooks-extras` to refresh. The
  # DOC_ID_TO_FRIENDLY mapping in libs/sources/src/handbooks-extras/ingest.ts
  # is intentionally retained for the same reason.
  # - doc_id: faa-h-8083-30
  #   edition: '30B'
  #   url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/amtg_handbook.pdf
  #   filename: amtg_handbook.pdf
  #   subjects: [aircraft-systems]
  #   primary_cert: null
  # - doc_id: faa-h-8083-32
  #   edition: '32B'
  #   url: https://www.faa.gov/regulations_policies/handbooks_manuals/aviation/amt_powerplant_handbook.pdf
  #   filename: amt_powerplant_handbook.pdf
  #   subjects: [aircraft-systems]
  #   primary_cert: null
  # Non-FAA-H-numbered FAA pamphlet. Synthetic doc_id since FAA never assigned
  # a Handbook number to Tips on Mountain Flying. Edition '2003' is the YAML
  # value (the locator slug is `mtn-2003`); current FAA-hosted version is
  # undated on the cover but traces to the early-2000s authoring window.
  - doc_id: faa-mtn-tips
    edition: '2003'
    url: https://www.faa.gov/sites/faa.gov/files/regulations_policies/handbooks_manuals/aviation/tips_on_mountain_flying.pdf
    filename: tips_on_mountain_flying.pdf
    subjects: [performance, weather, emergencies]
    primary_cert: null
