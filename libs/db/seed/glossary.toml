Absolute pressure in the engine induction system, measured in inches of mercury.

Manifold pressure (MP) indicates the air pressure in the engine intake manifold and is a primary power indicator for constant-speed propeller aircraft. Higher MP means more power. CFIs teach MP management in conjunction with RPM for proper power settings to avoid over-boosting or detonation."""
