[[reference]]
id = "vso-aircraft"
displayName = "Vso"
aliases = []
paraphrase = """
Stall speed in landing configuration (full flaps, gear down).

Vso is the stall speed or minimum steady flight speed with the aircraft in landing configuration. It defines the lower limit of the white arc on the airspeed indicator. Vso increases with weight and bank angle. It is used to calculate approach speeds (typically 1.3 Vso)."""
reviewedAt = "2026-04-22"
related = ["vs1-aircraft", "vref-aircraft"]

