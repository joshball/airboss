[[reference]]
id = "waas-nav"
displayName = "WAAS"
aliases = ["Wide Area Augmentation System"]
paraphrase = """
GPS augmentation providing precision approach capability.

WAAS improves GPS accuracy from meters to sub-meter using a network of ground reference stations and geostationary satellites. WAAS-equipped aircraft can fly LPV approaches with minimums comparable to ILS CAT I. WAAS eliminates the need for RAIM checks."""
reviewedAt = "2026-04-22"
related = ["gps-nav", "raim-nav", "lpv-nav"]

