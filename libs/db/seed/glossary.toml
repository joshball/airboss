[[reference]]
id = "lpv-nav"
displayName = "LPV"
aliases = ["Localizer Performance with Vertical Guidance"]
paraphrase = """
WAAS-based approach with ILS-like precision minimums.

LPV is the highest precision level of RNAV GPS approaches. It requires WAAS and provides lateral and vertical guidance comparable to ILS CAT I. LPV minimums can be as low as 200 feet HAT and 1/2 mile visibility. The approach uses angular scaling like a localizer."""
