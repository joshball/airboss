[[reference]]
id = "mach-number-def"
displayName = "Mach number"
aliases = []
paraphrase = """
Ratio of true airspeed to the local speed of sound.

Mach number is the ratio of TAS to the speed of sound at the current altitude and temperature. Mach 1.0 equals the speed of sound. Above FL250, airspeed limitations are often expressed as Mach numbers (Mmo). The speed of sound decreases with altitude, so a given Mach number represents a lower TAS at higher altitudes."""
reviewedAt = "2026-04-22"
related = ["tas-aircraft"]

