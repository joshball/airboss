id = "vref-aircraft"
displayName = "Vref"
aliases = []
paraphrase = """
Reference landing speed -- typically 1.3 Vso for the landing configuration.

Vref is the reference speed for landing, defined as the speed at which the aircraft crosses the 50-foot point on approach in the landing configuration. For most GA aircraft, approach speed is calculated as 1.3 times Vso. CFIs teach Vref management as critical for safe landings -- too slow risks stall, too fast causes floating and long landings."""
reviewedAt = "2026-04-22"
related = ["vso-aircraft", "vs1-aircraft"]

