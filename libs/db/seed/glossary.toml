[[reference]]
id = "vx-aircraft"
displayName = "Vx"
aliases = []
paraphrase = """
Best angle-of-climb speed -- maximum altitude gain per distance.

Vx produces the greatest altitude gain per unit of horizontal distance. Used for obstacle clearance after takeoff. Vx is slower than Vy and decreases with altitude. At the absolute ceiling, Vx and Vy converge. Flying below Vx risks operating on the back side of the power curve."""
reviewedAt = "2026-04-22"
related = ["vy-aircraft", "va-aircraft", "vr-aircraft"]

