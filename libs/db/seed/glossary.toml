id = "vy-aircraft"
displayName = "Vy"
aliases = []
paraphrase = """
Best rate-of-climb speed -- maximum altitude gain per time.

Vy produces the greatest altitude gain per unit of time. Used for normal climbs to cruise altitude when obstacle clearance is not a concern. Vy is faster than Vx and also decreases with altitude. At the absolute ceiling, Vy converges with Vx."""
reviewedAt = "2026-04-22"
