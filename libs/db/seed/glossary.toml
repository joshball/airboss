[[reference]]
id = "maintenance-def"
displayName = "Maintenance"
aliases = []
paraphrase = """
Inspection, overhaul, repair, preservation, and parts replacement -- excludes preventive maintenance.

Maintenance includes inspection, overhaul, repair, preservation, and replacement of parts, but excludes preventive maintenance. Only certificated mechanics (A&P) or repair stations may perform maintenance. CFIs must teach the distinction between maintenance and preventive maintenance, as pilots may perform the latter under 14 CFR 43 Appendix A."""
