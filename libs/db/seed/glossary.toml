id = "mda-ops"
displayName = "MDA"
aliases = ["Minimum Descent Altitude"]
paraphrase = """
Lowest altitude on a non-precision approach without required visual reference.

MDA is the lowest altitude to which descent is authorized on a non-precision approach without the required visual references. Upon reaching MDA, the pilot levels off and continues to the missed approach point (MAP). If the runway environment is not in sight at the MAP, a missed approach is mandatory."""
