[[reference]]
id = "loc-nav"
displayName = "LOC"
aliases = ["Localizer"]
paraphrase = """
Lateral guidance component of an ILS approach.

The localizer provides horizontal (left/right) guidance to the runway centerline during an ILS approach. It operates on frequencies between 108.10 and 111.95 MHz and has a typical course width of 3 to 6 degrees. A localizer-only approach (LOC approach) uses lateral guidance without the glideslope."""
