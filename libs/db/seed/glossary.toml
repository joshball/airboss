[[reference]]
id = "loc-safety"
displayName = "LOC-I"
aliases = ["Loss of Control-Inflight"]
paraphrase = """
NTSB accident category for uncontrolled flight -- leading cause of GA fatalities.

LOC-I encompasses accidents where the pilot fails to maintain or recover aircraft control, including stall/spin events, upset conditions, and VFR-into-IMC spatial disorientation. The GAJSC cited LOC as the number one cause of GA fatalities from 2012-2021. Prevention focuses on stall awareness, unusual attitude recovery, and angle-of-attack training."""
reviewedAt = "2026-04-22"
