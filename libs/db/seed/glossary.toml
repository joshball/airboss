id = "va-aircraft"
displayName = "Va (design maneuvering speed)"
aliases = ["Va", "maneuvering speed", "design maneuvering speed"]
paraphrase = "Skeleton entry. Va is the design maneuvering speed -- the maximum speed at which a full or abrupt control input (aileron, rudder, elevator) will not overstress the airframe, because the wing will stall before the limit load factor is exceeded. Va decreases with weight. Authoritative content (POH section 2, PHAK chapter 5, 14 CFR 23.335 historical context) to be captured here."
