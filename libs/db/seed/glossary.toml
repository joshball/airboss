paraphrase = """
Stall speed in clean configuration (flaps up, gear up).

Vs1 is the stall speed or minimum steady flight speed with the aircraft in a specified clean configuration. It defines the lower limit of the green arc on the airspeed indicator. The difference between Vs1 and Vso shows the effect of flaps on stall speed."""
