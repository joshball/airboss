[[reference]]
id = "major-alteration-def"
displayName = "Major alteration"
aliases = []
paraphrase = """
Alteration that may affect airworthiness or requires complex work beyond accepted practices.

A major alteration might appreciably affect weight, balance, structural strength, performance, powerplant operation, or flight characteristics, or cannot be done by elementary operations. Major alterations require FAA Form 337 and must be performed by appropriately rated mechanics or repair stations. CFIs should know this for maintenance record discussions."""
