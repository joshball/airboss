displayName = "MEA"
aliases = ["Minimum En Route Altitude"]
paraphrase = """
Lowest published altitude on an airway ensuring navaid reception and obstacle clearance.

MEA is the lowest published altitude between radio fixes that assures acceptable navigational signal coverage and meets obstacle clearance requirements. MEA guarantees 1,000 feet of obstacle clearance (2,000 feet in designated mountainous areas). CFIs teach MEA as the primary IFR altitude reference for en-route flight."""
