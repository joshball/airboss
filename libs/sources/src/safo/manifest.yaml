# Safety Alerts for Operators (SAFO) manifest -- registry seeding source
#
# Source of truth: ADR 019 §1.2 ("SAFO") + §2.6 (registry population).
# Loaded by `seedSafoFromManifest` in `seed.ts`.
#
# Locator shape: 5-digit `<YY><sequence>` id, e.g. `23001` = 2023 sequence 001.
# SAFOs are immutable post-publication; no `?at=` pin is required.
#
# Adding a new SAFO:
#   1. Add to `scripts/sources/config/safo.yaml` (downloader URL inventory).
#   2. Run the SAFO ingest (`bun run sources register safo`).
#   3. Add the row to this file.
#   4. Add the row to `course/references/safos.yaml`.
#   5. Register the (bulletin id -> document_slug, edition) mapping in
#      `libs/sources/src/safo/seed-mapping.ts`.

safo:
  - id: '23001'
    canonical_short: SAFO 23001
    canonical_formal: FAA Safety Alert for Operators 23001
    canonical_title: FAA SAFO 23001
    editions:
      - id: '2023'
        lifecycle: accepted

