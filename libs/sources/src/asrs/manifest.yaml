# Aviation Safety Reporting System (ASRS) manifest -- registry seeding source
#
# Source of truth: ADR 019 §1.2 ("ASRS") + §2.6 (registry population).
# Loaded by `seedAsrsFromManifest` in `seed.ts`.
#
# Demand-driven status: ASRS hosts >2M reports indexed by NASA's monotonic
# Accession Number (ACN). Cherry-picking specific ACNs into the manifest is
# content-curation work, not infrastructure -- the loader proves the wiring;
# populating is demand-driven as content authors begin citing specific ACNs.
#
# Adding an ACN:
#   - id: 6 or 7 digit ACN (no `?at=` pin -- ASRS reports are immutable).
#   - canonical_short / canonical_formal / canonical_title per ADR 019 §3.1.
#   - editions: a single entry whose id is the report's publication date.

asrs: []
