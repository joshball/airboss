# Federal statutes (US Code) manifest -- registry seeding source
#
# Source of truth: ADR 019 §1.2 ("Statutes") + §2.6 (registry population).
# Loaded by `seedStatutesFromManifest` in `seed.ts`.
#
# Locator shape: `<title>/<section>[/<subsection>]`. `<title>` is
# `usc-<title-number>` (e.g. `usc-49`). `<section>` and `<subsection>` are
# decimal / lowercase identifiers respectively.
#
# Adding a statute:
#   - id: `usc-<N>/<section>` (no leading prefix or `?at=` pin).
#   - canonical_short / canonical_formal / canonical_title per ADR 019 §3.1.
#   - editions: at least one entry. id is the public-law year (`YYYY`) or
#     the US Code revision date.

statutes:
