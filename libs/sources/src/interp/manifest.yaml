# Legal interpretations manifest -- registry seeding source
#
# Source of truth: ADR 019 §1.2 ("Legal interpretations") + §2.6 (registry
# population). Loaded by `seedInterpFromManifest` in `seed.ts`.
#
# Each entry produces one `SourceEntry` keyed at
# `airboss-ref:interp/<authority>/<slug>` plus one or more `Edition` records.
# Authors typically do not pin interp references with `?at=`; the edition
# exists for `last_amended_date` and metadata only.
#
# Adding an interpretation:
#   - id: the locator portion (`<authority>/<slug>`), no `airboss-ref:`
#     prefix. `<authority>` is `chief-counsel` or `ntsb`.
#     - chief-counsel: slug is `<author>-<YYYY>` kebab-case
#     - ntsb: slug is the kebab-cased case name (e.g. `administrator-v-lobeiko`)
#   - canonical_short / canonical_formal / canonical_title per ADR 019 §3.1.
#   - editions: at least one entry with the publication year as `id`.
#   - source_url (optional): direct PDF / case page URL. When the per-letter
#     CMS document URL is unknown, fall back to the AGC interpretations
#     index URL (the live URL builder uses the index as a landing page
#     anyway -- see interp/url.ts).
#
# Coverage scope (v1, registry-only): Office of Chief Counsel interpretations
# referenced by name in CFI / PPL / IR / CPL / ATP training. The list is
# anchored on interpretations that pilot/CFI training literature cites by
# recipient name -- "the Mangiamele letter," "the Walker letter," and so on
# -- not exhaustive coverage of every letter the AGC has ever issued.
# Speculative or possibly-misnamed letters are deliberately omitted per the
# project rule against unverified references. Ordered chronologically,
# oldest first. NTSB Board orders follow at the bottom under their own
# authority.

