# Type Certificate Data Sheet (TCDS) manifest -- registry seeding source
#
# Source of truth: ADR 019 §1.2 ("TCDS") + §2.6 (registry population).
# Loaded by `seedTcdsFromManifest` in `seed.ts`.
#
# Locator shape: `<tcds-number>` lowercased (FAA's catalog id, e.g. `3a12`,
# `a00009ch`). The locator parser normalizes to lowercase.
#
# Adding a TCDS:
#   - id: lowercase TCDS catalog number.
#   - canonical_short / canonical_formal / canonical_title per ADR 019 §3.1.
#   - editions: at least one entry. id is the revision date (`YYYY-MM`) or
#     the type-certificate date.

tcds:
  # 3A12 -- Cessna 172 family.
  - id: 3a12
    canonical_short: TCDS 3A12
    canonical_formal: FAA Type Certificate Data Sheet 3A12 (Cessna 172)
    canonical_title: TCDS 3A12 (Cessna 172)
    editions:
      - id: '2020'
        lifecycle: accepted

  # 2A13 -- Piper PA-28 family.
  - id: 2a13
    canonical_short: TCDS 2A13
    canonical_formal: FAA Type Certificate Data Sheet 2A13 (Piper PA-28)
    canonical_title: TCDS 2A13 (Piper PA-28)
    editions:
      - id: '2019'
        lifecycle: accepted

  # A00009CH -- Cirrus SR22.
  - id: a00009ch
    canonical_short: TCDS A00009CH
    canonical_formal: FAA Type Certificate Data Sheet A00009CH (Cirrus SR22)
    canonical_title: TCDS A00009CH (Cirrus SR22)
    editions:
      - id: '2022'
        lifecycle: accepted

  # A4CE -- Diamond DA40.
  - id: a4ce
    canonical_short: TCDS A4CE
    canonical_formal: FAA Type Certificate Data Sheet A4CE (Diamond DA40)
    canonical_title: TCDS A4CE (Diamond DA40)
    editions:
      - id: '2021'
        lifecycle: accepted
